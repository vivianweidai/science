# Toys (scientific instruments & technologies) — single source of truth.
# Run `python archives/LAYOUT/build_toys.py` after edits to regenerate JSON.
#
# Three-level schema:
#   science:      Biology | Chemistry | Physics | Computing |        (required)
#                 Mathematics | Astronomy
#   topic:        string — top-level heading (e.g. Vibrational Spectroscopy) (required)
#   technologies: list of techniques within this topic                (required)
#     - technology:   string — technique name (e.g. Infrared)         (required)
#       description:  string — what this technique does               (required)
#       toys:         list of specific instruments                    (optional — omit if no specific toys)
#         - toy:          string — instrument name                    (required)
#           specs:        string — key specs                          (required)
#           highlighted:  true                                        (optional)
#           available:    true                                        (optional)
#           completed:    "YYYYMMDD Project Name"                     (optional — links to project page)
#           url:          string — external URL                       (optional — links toy name to any URL)

# ═══════════════════════════════════════════════════════════════
# MATHEMATICS
# ═══════════════════════════════════════════════════════════════

- science: Mathematics
  topic: Symbolic Computation
  technologies:
    - technology: Computer Algebra
      description: Exact symbolic solutions — no rounding, no approximation
      toys:
        - toy: Wolfram Alpha
          specs: Symbolic engine with mathematical knowledge base and interactive notebooks
          highlighted: true
          available: true
          url: https://www.wolframcloud.com/obj/jamesdai/Published/exoplanets.nb
    - technology: Proof Assistant
      description: Machine-verified proofs where every logical step is checked
      toys:
        - toy: Lean
          specs: Dependent type theory with the Mathlib library of formalized theorems

- science: Mathematics
  topic: Numerical Computation
  technologies:
    - technology: Linear Algebra
      description: Array operations, matrix decomposition, and vectorized computation
      toys:
        - toy: NumPy
          specs: N-dimensional arrays, broadcasting, and linear algebra routines
          available: true
    - technology: Scientific Computing
      description: Solvers for differential equations, optimization, and signal processing
      toys:
        - toy: SciPy
          specs: ODE integrators, minimization, curve fitting, and Fourier transforms
          available: true

- science: Mathematics
  topic: Visualization
  technologies:
    - technology: Graphing
      description: Publication-quality figures from functions, data, and surfaces
      toys:
        - toy: Matplotlib
          specs: Two-dimensional and three-dimensional Python plotting with full style control
          available: true
    - technology: Typesetting
      description: Professionally formatted mathematical documents with perfect equations
      toys:
        - toy: LaTeX
          specs: Equation typesetting, numbered references, and bibliography management
          available: true

# ═══════════════════════════════════════════════════════════════
# COMPUTING
# ═══════════════════════════════════════════════════════════════

- science: Computing
  topic: Data Science
  technologies:
    - technology: Statistical Analysis
      description: Fit models, test hypotheses, and quantify uncertainty in experimental data
      toys:
        - toy: R
          specs: Statistical modeling, hypothesis testing, and Bayesian inference
          highlighted: true
          completed: "20250225 Catfood"
    - technology: Machine Learning
      description: Train models that learn patterns from data and generalize to new observations
      toys:
        - toy: scikit-learn
          specs: Regression, classification, clustering, and cross-validation pipelines
          available: true
        - toy: PyTorch
          specs: Neural networks and deep learning with GPU-accelerated training
          available: true
    - technology: GPU Computing
      description: Scale computation to thousands of cores for simulation and model training
      toys:
        - toy: GPU Cluster
          specs: Multi-node SLURM-scheduled jobs with NVIDIA GPUs
          available: true

- science: Computing
  topic: Documentation
  technologies:
    - technology: Repository
      description: Every change to code and data tracked, versioned, and shared openly
      toys:
        - toy: GitHub
          specs: Git repositories, pull requests, issue tracking, and continuous integration
          highlighted: true
          available: true
          url: https://github.com/vivianweidai
        - toy: Jupyter
          specs: Literate Python notebooks combining code, figures, and narrative in one document
          highlighted: true
          available: true
          completed: "20260401 IR Spectroscopy"
    - technology: Reproducibility
      description: Anyone can rerun your analysis and get the same results
      toys:
        - toy: Docker
          specs: Containerized environments that freeze every dependency and configuration
          available: true
        - toy: Zenodo
          specs: Permanent DOI archive — making datasets and code citable forever

# ═══════════════════════════════════════════════════════════════
# PHYSICS
# ═══════════════════════════════════════════════════════════════


- science: Physics
  topic: Measurement
  technologies:
    - technology: Electronics
      description: Measure voltage, current, and resistance in circuits and materials
      toys:
        - toy: Oscilloscope
          specs: Capture waveforms in time and frequency domains
        - toy: Four-Point Probe
          specs: Sheet resistance of conductive thin films
          highlighted: true
          available: true
          completed: "20260404 Four Point Probe"
    - technology: Optics
      description: Produce, separate, and recombine light to reveal composition and structure
      toys:
        - toy: Laser
          specs: Coherent 632.8 nm light for alignment, diffraction, and interference
        - toy: Spectrometer
          specs: Resolve atomic emission lines by separating light into component wavelengths
        - toy: Interferometer
          specs: Measure wavelength and refractive index by splitting and recombining beams

- science: Physics
  topic: Neuroimaging
  technologies:
    - technology: Electrical
      description: Record neural electrical and magnetic activity with millisecond resolution
      toys:
        - toy: EEG
          specs: Scalp electrodes capturing event-related potentials and oscillations
        - toy: MEG
          specs: Whole-head magnetometer array for source-localized brain signals
    - technology: Blood Flow
      description: Track blood flow and oxygenation changes in the brain over seconds
      toys:
        - toy: fNIRS
          specs: Portable near-infrared cortical oxygenation mapping
        - toy: 3T MRI
          specs: Structural and functional imaging of the human brain

# ═══════════════════════════════════════════════════════════════
# CHEMISTRY
# ═══════════════════════════════════════════════════════════════

- science: Chemistry
  topic: Spectroscopy
  technologies:
    - technology: Vibrational
      description: Infrared and Raman — probe molecular bonds by how they absorb or scatter light
      toys:
        - toy: IR Spectrometer
          specs: Identify polar bonds and functional groups, 4000–400 cm⁻¹, ATR and transmission
          highlighted: true
          available: true
          completed: "20260401 IR Spectroscopy"
        - toy: Raman Microscope
          specs: Identify nonpolar bonds and ring breathing modes via confocal laser scattering
          available: true
    - technology: Electronic
      description: UV-Visible absorption and fluorescence — measure electronic transitions and emission
      toys:
        - toy: Spectrophotometer
          specs: Electronic transitions, concentration, and color across 190–3300 nm
          available: true
        - toy: Spectrofluorometer
          specs: Excited-state emission and molecular environment from excitation-emission matrices
          available: true
    - technology: Chiroptical
      description: Probe molecular handedness and protein secondary structure using polarized light
      toys:
        - toy: CD Spectrometer
          specs: Circular dichroism — helix, sheet, and coil content of proteins
          available: true
        - toy: Polarimeter
          specs: Optical rotation and enantiomeric excess of chiral molecules
          available: true
    - technology: Magnetic Resonance
      description: Place samples in a strong magnetic field and read nuclear or electron spin signals
      toys:
        - toy: NMR Spectrometer
          specs: Molecular connectivity from 1H and 13C chemical shifts at 400, 500, and 700 MHz
          available: true
        - toy: EPR Spectrometer
          specs: Detect unpaired electrons in radicals and metal centers, variable temperature to 4 K
          available: true

- science: Chemistry
  topic: Mass Spectrometry
  technologies:
    - technology: GC-MS
      description: Identify volatile compounds by vaporizing, separating, and fragmenting them
      toys:
        - toy: GC-MS
          specs: Electron ionization, NIST library search, quadrupole mass analyzer
          available: true
    - technology: LC-MS
      description: Identify nonvolatile compounds in solution by molecular weight
      toys:
        - toy: LC-MS
          specs: Electrospray ionization, nominal and high-resolution accurate mass
          available: true
    - technology: MALDI
      description: Weigh intact polymers and biomolecules by laser desorption from a solid matrix
      toys:
        - toy: MALDI-TOF
          specs: Benchtop matrix-assisted laser desorption, polymer and peptide analysis
          available: true
    - technology: ICP-MS
      description: Identify and quantify trace elements by atomizing samples in plasma
      toys:
        - toy: ICP-MS
          specs: Parts-per-billion elemental analysis across the periodic table

- science: Chemistry
  topic: Chromatography
  technologies:
    - technology: Liquid
      description: Separate and quantify components dissolved in a liquid mixture
      toys:
        - toy: HPLC
          specs: Analytical and preparative dual stacks with UV and refractive index detection
          available: true
    - technology: Gas
      description: Separate and quantify volatile compounds carried through a column by inert gas
      toys:
        - toy: GC-FID
          specs: Flame ionization detection, standalone or coupled to MS, chiral column available
          available: true

- science: Chemistry
  topic: Thermal Analysis
  technologies:
    - technology: Melting Point
      description: Determine when a solid melts to assess identity and purity
      toys:
        - toy: Melting Point Apparatus
          specs: Visual capillary method with digital temperature readout
          available: true
          completed: "20260405 Melting Point"
    - technology: Thermogravimetry
      description: Measure mass loss as temperature rises to reveal decomposition and moisture content
      toys:
        - toy: TGA
          specs: Ramp to 1000 °C under nitrogen or air, milligram sensitivity
          available: true
    - technology: Calorimetry
      description: Measure heat flow to detect glass transitions, crystallization, and phase changes
      toys:
        - toy: DSC
          specs: Modulated differential scanning calorimetry, heat capacity measurement
          available: true

- science: Chemistry
  topic: Structural Analysis
  technologies:
    - technology: X-Ray Diffraction
      description: Bounce X-rays off crystals to identify phases or solve full 3D atomic structures
      toys:
        - toy: Powder XRD
          specs: Phase identification, lattice parameters, and Rietveld refinement
          available: true
        - toy: Single-Crystal XRD
          specs: Complete 3D atomic coordinates from individual crystals
          available: true
    - technology: Scanning Probe
      description: Drag a sharp tip across a surface to map topography and electronic states at atomic scale
      toys:
        - toy: AFM
          specs: Contact and tapping mode, nanometer-resolution height maps
          available: true
        - toy: STM
          specs: Atomic-resolution conductance maps of conductive surfaces
          available: true


- science: Chemistry
  topic: Synthesis and Preparation
  technologies:
    - technology: Microwave Reactor
      description: Accelerate chemical reactions with rapid sealed-vessel heating under pressure
      toys:
        - toy: Microwave Reactor
          specs: 300 W, 300 °C, 20 bar, single-mode cavity
          available: true
    - technology: Ozone Generator
      description: Cleave carbon-carbon double bonds by oxidation with ozone gas
      toys:
        - toy: Ozone Generator
          specs: Bench-scale ozone production for organic synthesis
          available: true
    - technology: Centrifuge
      description: Separate mixtures by spinning them at high speed so denser components sink
      toys:
        - toy: Centrifuge
          specs: 500–15,000 rpm, refrigerated, temperature-controlled
          highlighted: true
          available: true
          completed: "20260411 Centrifuge"
    - technology: pH Measurement
      description: Measure how acidic or basic a solution is
      toys:
        - toy: pH Meter
          specs: Benchtop electrode with 3-point buffer calibration
          highlighted: true
          available: true
          completed: "20260411 Centrifuge"
    - technology: Ultrapure Water
      description: Produce contaminant-free water for sensitive experiments
      toys:
        - toy: Water Purification System
          specs: 18.2 MΩ·cm Type 1 reagent-grade water with UV oxidation
          available: true
    - technology: Analytical Balance
      description: Weigh samples with precision down to hundredths of a milligram
      toys:
        - toy: Analytical Balance
          specs: 0.01 mg readability with internal calibration
          available: true

# ═══════════════════════════════════════════════════════════════
# BIOLOGY
# ═══════════════════════════════════════════════════════════════

- science: Biology
  topic: Molecular Biology
  technologies:
    - technology: PCR
      description: Amplify specific DNA sequences for detection and cloning
      toys:
        - toy: miniPCR Thermal Cycler
          specs: 96-well, portable, Bluetooth-connected
    - technology: Protein Expression
      description: Produce proteins from DNA templates in cell-free systems
      toys:
        - toy: BioBits Cell-Free System
          specs: In vitro transcription-translation, fluorescent reporters
    - technology: Gel / Plate Detection
      description: Visualize gene expression products by fluorescence or absorbance
      toys:
        - toy: P51 Fluorescence Viewer
          specs: Blue/green excitation, gel and plate imaging

- science: Biology
  topic: Genomics
  technologies:
    - technology: Short-Read Sequencing
      description: Massively parallel sequencing for genome and transcriptome profiling
      toys:
        - toy: Illumina NextSeq 2000
          specs: Up to 400M reads/run, 2×150 bp paired-end
    - technology: Long-Read Sequencing
      description: Full-length reads for structural variants and complete transcripts
      toys:
        - toy: PacBio / Oxford Nanopore
          specs: 10–100 kb reads, direct RNA sequencing
    - technology: Single-Cell Genomics
      description: Profile gene expression in individual cells
      toys:
        - toy: 10x Chromium
          specs: Droplet-based scRNA-seq, cell-type clustering
    - technology: Quantitative PCR
      description: Measure target copy number and gene expression levels
      toys:
        - toy: QuantStudio 3
          specs: Real-time qPCR, 96-well, SYBR/TaqMan

- science: Biology
  topic: Proteomics
  technologies:
    - technology: Tandem Mass Spectrometry
      description: Identify and quantify proteins by fragmentation
      toys:
        - toy: Thermo Orbitrap Eclipse
          specs: LC-MS/MS, TMT labeling, phosphoproteomics
        - toy: Bruker timsTOF Pro2
          specs: Ion mobility, dia-PASEF, high throughput

- science: Biology
  topic: Cell Analysis
  technologies:
    - technology: Flow Cytometry & Sorting
      description: Count, characterize, and isolate cells by surface markers
      toys:
        - toy: BD / Sony Cell Sorters
          specs: Multi-color FACS, rare cell isolation, high speed
    - technology: Metabolic Analysis
      description: Measure cellular respiration and glycolysis in real time
      toys:
        - toy: Seahorse XF Analyzer
          specs: Oxygen consumption rate, extracellular acidification

- science: Biology
  topic: Microscopy
  technologies:
    - technology: Confocal
      description: Optical sectioning by laser scanning for 3D fluorescence imaging
      toys:
        - toy: Leica SP8 LIGHTNING Confocal
          specs: Adaptive deconvolution, 5 laser lines, spectral detection
    - technology: Two-Photon
      description: Deep-tissue imaging via nonlinear excitation in thick samples
      toys:
        - toy: Scientifica Two-Photon System
          specs: 900+ nm excitation, live animal, 1 mm penetration
    - technology: Super-Resolution
      description: Bypass the diffraction limit for nanoscale cellular structures
      toys:
        - toy: STED / SIM Systems
          specs: Sub-100 nm resolution, fixed and live cells
    - technology: Light Sheet
      description: Rapid volumetric imaging of whole organisms with minimal bleaching
      toys:
        - toy: LaVision BioTec Light Sheet
          specs: Cleared tissue, whole embryo, dual-sided illumination

- science: Biology
  topic: Electron Microscopy
  technologies:
    - technology: Scanning Electron
      description: Scan a focused electron beam across a surface to image morphology and map elements
      toys:
        - toy: SEM
          specs: Secondary and backscatter imaging, EDS elemental mapping
        - toy: FIB-SEM
          specs: Focused ion beam for cross-sectioning and site-specific TEM sample prep
    - technology: Transmission Electron
      description: Transmit electrons through an ultra-thin specimen to reveal internal nanostructure
      toys:
        - toy: TEM
          specs: 200 kV, lattice imaging, electron diffraction, and EDS analysis

# ═══════════════════════════════════════════════════════════════
# ASTRONOMY
# ═══════════════════════════════════════════════════════════════

- science: Astronomy
  topic: Observational Astronomy
  technologies:
    - technology: Optical Telescope
      description: Visual and CCD imaging of stars, planets, and deep-sky objects
      toys:
        - toy: MacLean Observatory
          specs: 22" and 14" telescopes, CCD cameras
    - technology: Stellar Spectroscopy
      description: Chemical composition, temperature, and redshift from starlight
      toys:
        - toy: Spectrometer
          specs: Diffraction grating, wavelength calibration, line identification
    - technology: Radio Observation
      description: Detect radio emission from pulsars, galaxies, and cosmic hydrogen
      toys:
        - toy: Radio / Survey Arrays
          specs: 21 cm hydrogen mapping, transient detection

- science: Astronomy
  topic: Computational Astronomy
  technologies:
    - technology: Orbit Simulation
      description: N-body dynamics, mission planning, and ephemeris computation
      toys:
        - toy: REBOUND / AstroPy
          specs: Gravitational integrators, Horizons interface
    - technology: Image Processing
      description: Stack, calibrate, and extract photometry from astronomical images
      toys:
        - toy: AstroPy / Photometry Pipelines
          specs: Flat/dark calibration, aperture photometry, WCS alignment
