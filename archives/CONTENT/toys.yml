# Toys (scientific instruments & technologies) — single source of truth.
# Run `python archives/LAYOUT/build_toys.py` after edits to regenerate JSON.
#
# Three-level schema:
#   science:      Biology | Chemistry | Physics | Computing |        (required)
#                 Mathematics | Astronomy
#   topic:        string — top-level heading (e.g. Vibrational Spectroscopy) (required)
#   technologies: list of techniques within this topic                (required)
#     - technology:   string — technique name (e.g. Infrared)         (required)
#       description:  string — what this technique does               (required)
#       toys:         list of specific instruments                    (optional — omit if no specific toys)
#         - toy:          string — instrument name                    (required)
#           specs:        string — key specs                          (required)
#           highlighted:  true                                        (optional)
#           available:    true                                        (optional)
#           completed:    "YYYYMMDD Project Name"                     (optional — links to project page)
#           url:          string — external URL                       (optional — links toy name to any URL)

# ═══════════════════════════════════════════════════════════════
# MATHEMATICS
# ═══════════════════════════════════════════════════════════════

- science: Mathematics
  topic: Symbolic Computation
  technologies:
    - technology: Computer Algebra
      description: Exact symbolic solutions — no rounding, no approximation
      toys:
        - toy: Wolfram Alpha
          specs: Symbolic engine with mathematical knowledge base and interactive notebooks
          highlighted: true
          available: true
          url: https://www.wolframcloud.com/obj/jamesdai/Published/exoplanets.nb
    - technology: Proof Assistant
      description: Machine-verified proofs where every logical step is checked
      toys:
        - toy: Lean
          specs: Dependent type theory with the Mathlib library of formalized theorems

- science: Mathematics
  topic: Numerical Computation
  technologies:
    - technology: Linear Algebra
      description: Array operations, matrix decomposition, and vectorized computation
      toys:
        - toy: NumPy
          specs: N-dimensional arrays, broadcasting, and linear algebra routines
          available: true
    - technology: Scientific Computing
      description: Solvers for differential equations, optimization, and signal processing
      toys:
        - toy: SciPy
          specs: ODE integrators, minimization, curve fitting, and Fourier transforms
          available: true

- science: Mathematics
  topic: Visualization
  technologies:
    - technology: Graphing
      description: Publication-quality figures from functions, data, and surfaces
      toys:
        - toy: Matplotlib
          specs: Two-dimensional and three-dimensional Python plotting with full style control
          available: true
    - technology: Typesetting
      description: Professionally formatted mathematical documents with perfect equations
      toys:
        - toy: LaTeX
          specs: Equation typesetting, numbered references, and bibliography management
          available: true

# ═══════════════════════════════════════════════════════════════
# COMPUTING
# ═══════════════════════════════════════════════════════════════

- science: Computing
  topic: Data Science
  technologies:
    - technology: Statistical Analysis
      description: Fit models, test hypotheses, and quantify uncertainty in experimental data
      toys:
        - toy: R
          specs: Statistical modeling, hypothesis testing, and Bayesian inference
          highlighted: true
          completed: "20250225 Catfood"
    - technology: Machine Learning
      description: Train models that learn patterns from data and generalize to new observations
      toys:
        - toy: scikit-learn
          specs: Regression, classification, clustering, and cross-validation pipelines
          available: true
        - toy: PyTorch
          specs: Neural networks and deep learning with GPU-accelerated training
          available: true
    - technology: GPU Computing
      description: Scale computation to thousands of cores for simulation and model training
      toys:
        - toy: GPU Cluster
          specs: Multi-node SLURM-scheduled jobs with NVIDIA GPUs
          available: true

- science: Computing
  topic: Documentation
  technologies:
    - technology: Repository
      description: Every change to code and data tracked, versioned, and shared openly
      toys:
        - toy: GitHub
          specs: Git repositories, pull requests, issue tracking, and continuous integration
          highlighted: true
          available: true
          url: https://github.com/vivianweidai
        - toy: Jupyter
          specs: Literate Python notebooks combining code, figures, and narrative in one document
          highlighted: true
          available: true
          completed: "20260401 IR Spectroscopy"
    - technology: Reproducibility
      description: Anyone can rerun your analysis and get the same results
      toys:
        - toy: Docker
          specs: Containerized environments that freeze every dependency and configuration
          available: true
        - toy: Zenodo
          specs: Permanent DOI archive — making datasets and code citable forever

# ═══════════════════════════════════════════════════════════════
# PHYSICS
# ═══════════════════════════════════════════════════════════════


- science: Physics
  topic: Measurement
  technologies:
    - technology: Electronics
      description: Measure voltage, current, and resistance in circuits and materials
      toys:
        - toy: Oscilloscope
          specs: Capture waveforms in time and frequency domains
        - toy: Jandel RM3 Four-Point Probe
          specs: Sheet resistance of conductive thin films
          highlighted: true
          available: true
          completed: "20260404 Four Point Probe"
    - technology: Optics
      description: Produce, separate, and recombine light to reveal composition and structure
      toys:
        - toy: Laser
          specs: Coherent 632.8 nm light for alignment, diffraction, and interference
        - toy: Spectrometer
          specs: Resolve atomic emission lines by separating light into component wavelengths
        - toy: Interferometer
          specs: Measure wavelength and refractive index by splitting and recombining beams

- science: Physics
  topic: Neuroimaging
  technologies:
    - technology: Electrical
      description: Record neural electrical and magnetic activity with millisecond resolution
      toys:
        - toy: EEG
          specs: Scalp electrodes capturing event-related potentials and oscillations
        - toy: MEG
          specs: Whole-head magnetometer array for source-localized brain signals
    - technology: Blood Flow
      description: Track blood flow and oxygenation changes in the brain over seconds
      toys:
        - toy: fNIRS
          specs: Portable near-infrared cortical oxygenation mapping
        - toy: 3T MRI
          specs: Structural and functional imaging of the human brain

# ═══════════════════════════════════════════════════════════════
# CHEMISTRY
# ═══════════════════════════════════════════════════════════════

- science: Chemistry
  topic: Vibrational Spectroscopy
  technologies:
    - technology: Infrared
      description: Identify polar bonds and functional groups by mid-IR absorption
      toys:
        - toy: Thermo Nicolet 380 FT-IR
          specs: 4000–400 cm⁻¹, ATR diamond crystal, transmission mode
          available: true
          completed: "20260401 IR Spectroscopy"
        - toy: Bruker Tensor 27 / Hyperion
          specs: FT-IR microscope, spatially resolved micro-IR spectra
          available: true
    - technology: Raman
      description: Identify nonpolar bonds and breathing modes via inelastic scattering
      toys:
        - toy: Renishaw inVia Raman Microscope
          specs: Confocal, 785 nm laser, mineral and polymer identification
          available: true

- science: Chemistry
  topic: Electronic Spectroscopy
  technologies:
    - technology: UV-Vis Absorption
      description: Measure electronic transitions, concentration, and color
      toys:
        - toy: PerkinElmer Lambda 750
          specs: 190–3300 nm UV-Vis-NIR, double beam
          available: true
        - toy: Shimadzu UV-2550
          specs: 190–900 nm UV-Vis, high resolution
          available: true
    - technology: Fluorescence
      description: Detect excited-state emission and molecular environment
      toys:
        - toy: Horiba FluoroMax-3
          specs: Steady-state and time-resolved, excitation-emission matrices
          available: true
    - technology: Chiroptical
      description: Probe molecular handedness and secondary structure
      toys:
        - toy: Jasco J-1500 CD
          specs: Circular dichroism — helix, sheet, coil content
          available: true
        - toy: Jasco P-2000 Polarimeter
          specs: Optical rotation, enantiomeric excess
          available: true

- science: Chemistry
  topic: Magnetic Resonance
  technologies:
    - technology: NMR (Liquid-State)
      description: Determine molecular connectivity from nuclear spin in magnetic fields
      toys:
        - toy: Bruker 400 MHz NMR
          specs: 1H, 13C, routine structure elucidation
          available: true
        - toy: Bruker 500 MHz NMR
          specs: Higher resolution, 2D experiments, natural abundance 13C
          available: true
        - toy: Bruker 700 MHz NMR
          specs: Cryoprobe, highest sensitivity, biomolecular NMR
          available: true
    - technology: NMR (Solid-State)
      description: Probe insoluble materials — polymers, minerals, catalysts
      toys:
        - toy: Tecmag 400 MHz Solid-State NMR
          specs: CP/MAS, crystalline and amorphous phase analysis
          available: true
    - technology: EPR
      description: Detect unpaired electrons — radicals, metal centers, defects
      toys:
        - toy: Bruker EMXPlus EPR
          specs: X-band, variable temperature to 4 K with He cryostat
          available: true

- science: Chemistry
  topic: Mass Spectrometry
  technologies:
    - technology: GC-MS
      description: Identify volatile compounds by fragmentation pattern
      toys:
        - toy: Agilent 7890A / 5975C GC-MS
          specs: Electron ionization, NIST library, quadrupole
          available: true
    - technology: LC-MS
      description: Identify nonvolatile compounds by molecular weight
      toys:
        - toy: Waters ZQ ESCi LC-MS
          specs: Electrospray, atmospheric pressure, nominal mass
          available: true
        - toy: Agilent 6230 TOF LC-MS
          specs: High-resolution accurate mass, molecular formula
          available: true
    - technology: MALDI-TOF
      description: Weigh intact polymers and biomolecules from solid matrix
      toys:
        - toy: Shimadzu MALDI-8020
          specs: Benchtop MALDI-TOF, polymer and peptide analysis
          available: true

- science: Chemistry
  topic: Chromatography
  technologies:
    - technology: HPLC
      description: Separate and quantify components in liquid mixtures
      toys:
        - toy: Agilent 1200 Series HPLC
          specs: Dual stacks, analytical and preparative, UV/RI detection
          available: true
    - technology: GC
      description: Separate and quantify volatile compounds in gas phase
      toys:
        - toy: Agilent 7890A GC-FID
          specs: Standalone GC, flame ionization, chiral column available
          available: true

- science: Chemistry
  topic: Thermal Analysis
  technologies:
    - technology: Melting Point
      description: Determine melting temperature and assess sample purity
      toys:
        - toy: OptiMelt Automated Melting Point
          specs: Visual detection, capillary method, digital readout
          available: true
          completed: "20260405 Melting Point"
    - technology: TGA
      description: Measure mass loss as a function of temperature
      toys:
        - toy: TA Instruments TGA Q50
          specs: Decomposition temperature, moisture, residual ash
          available: true
    - technology: DSC
      description: Measure heat flow — glass transitions, crystallization, melting
      toys:
        - toy: TA Instruments DSC Q20
          specs: Modulated DSC, Tg, crystallinity, heat capacity
          available: true

- science: Chemistry
  topic: Structural & Surface Analysis
  technologies:
    - technology: X-Ray Diffraction
      description: Identify crystal phases and determine atomic coordinates
      toys:
        - toy: Bruker D8 Advance Powder XRD
          specs: Phase identification, lattice parameters, Rietveld
          available: true
        - toy: Bruker D8 Venture SC-XRD
          specs: Full 3D structure from single crystals, Cu + Mo sources
          available: true
    - technology: Scanning Probe
      description: Image surface topography and electronic states at atomic scale
      toys:
        - toy: Nanosurf EasyScan 2 AFM
          specs: Contact and tapping mode, nm-resolution topography
          available: true
        - toy: Nanosurf EasyScan 2 STM
          specs: Atomic-resolution conductance maps
          available: true

- science: Chemistry
  topic: Electron Microscopy
  technologies:
    - technology: SEM
      description: Image surfaces and map elemental composition with focused electrons
      toys:
        - toy: FEI Talos F200s S/TEM
          specs: STEM mode, EDS mapping, sub-nm resolution
        - toy: Thermo Scios 2 FIB/SEM
          specs: Focused ion beam cross-section, site-specific TEM prep
    - technology: TEM
      description: Transmit electrons through thin specimens to image internal nanostructure
      toys:
        - toy: JEOL JEM 2100F TEM
          specs: 200 kV, lattice imaging, EDS, diffraction
    - technology: Cryo-EM
      description: Image biological structures in native frozen-hydrated state
      toys:
        - toy: Titan Krios (UBC/MIT)
          specs: 300 kV, K3 detector, near-atomic resolution

- science: Chemistry
  topic: Synthesis
  technologies:
