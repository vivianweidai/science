# Toys (scientific instruments & technologies) — single source of truth.
# Run `python archives/LAYOUT/build_toys.py` after edits to regenerate JSON.
#
# Schema:
#   science:      Biology | Chemistry | Physics | Computing |     (required)
#                 Mathematics | Astronomy
#   technology:   string — technology group name                  (required)
#   principle:    string — operating principle / technique name    (required)
#   question:     string — what question does it answer           (required)
#   answer:       string — what information you get               (required)
#   state:        string — sample state required                  (required)
#   highlighted:  true                                            (optional — marks rows with yellow highlight)
#   available:    true                                            (optional — instrument is accessible at SIL)
#   completed:    "YYYYMMDD Project Name"                         (optional — folder name under research/projects/)

