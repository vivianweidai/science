      description: Rapid reaction acceleration under sealed-vessel pressure
      toys:
        - toy: CEM Discover Microwave Reactor
          specs: 300 W, 300 °C, 20 bar, single-mode cavity
          available: true
    - technology: Ozonolysis
      description: Oxidative cleavage of carbon-carbon double bonds
      toys:
        - toy: Orec Ozone Generator
          specs: Bench-scale O₃ production for organic synthesis
          available: true

- science: Chemistry
  topic: General Lab
  technologies:
    - technology: Separation
      description: Separate mixtures by density via centrifugal force
      toys:
        - toy: Thermo Refrigerated Centrifuge
          specs: 500–15,000 rpm, temperature control, various rotors
          available: true
          completed: "20260411 Centrifuge"
    - technology: pH Measurement
      description: Measure acidity and basicity of aqueous solutions
      toys:
        - toy: VWR pH 1100 L
          specs: Benchtop pH meter, 3-point buffer calibration
          available: true
          completed: "20260411 Centrifuge"
    - technology: Ultrapure Water
      description: Reagent-grade water for sensitive experiments
      toys:
        - toy: Smart2Pure Water System
          specs: 18.2 MΩ·cm Type 1 water, UV oxidation
          available: true
    - technology: Mass Measurement
      description: Precision weighing for quantitative sample preparation
      toys:
        - toy: Mettler AE 100 Analytical Balance
          specs: 0.01 mg readability, internal calibration
          available: true

# ═══════════════════════════════════════════════════════════════
# BIOLOGY
# ═══════════════════════════════════════════════════════════════

- science: Biology
  topic: Molecular Biology
  technologies:
    - technology: PCR
      description: Amplify specific DNA sequences for detection and cloning
      toys:
        - toy: miniPCR Thermal Cycler
          specs: 96-well, portable, Bluetooth-connected
    - technology: Protein Expression
      description: Produce proteins from DNA templates in cell-free systems
      toys:
        - toy: BioBits Cell-Free System
          specs: In vitro transcription-translation, fluorescent reporters
    - technology: Gel / Plate Detection
      description: Visualize gene expression products by fluorescence or absorbance
      toys:
        - toy: P51 Fluorescence Viewer
          specs: Blue/green excitation, gel and plate imaging

- science: Biology
  topic: Genomics
  technologies:
    - technology: Short-Read Sequencing
      description: Massively parallel sequencing for genome and transcriptome profiling
      toys:
        - toy: Illumina NextSeq 2000
          specs: Up to 400M reads/run, 2×150 bp paired-end
    - technology: Long-Read Sequencing
      description: Full-length reads for structural variants and complete transcripts
      toys:
        - toy: PacBio / Oxford Nanopore
          specs: 10–100 kb reads, direct RNA sequencing
    - technology: Single-Cell Genomics
      description: Profile gene expression in individual cells
      toys:
        - toy: 10x Chromium
          specs: Droplet-based scRNA-seq, cell-type clustering
    - technology: Quantitative PCR
      description: Measure target copy number and gene expression levels
      toys:
        - toy: QuantStudio 3
          specs: Real-time qPCR, 96-well, SYBR/TaqMan

- science: Biology
  topic: Proteomics
  technologies:
    - technology: Tandem Mass Spectrometry
      description: Identify and quantify proteins by fragmentation
      toys:
        - toy: Thermo Orbitrap Eclipse
          specs: LC-MS/MS, TMT labeling, phosphoproteomics
        - toy: Bruker timsTOF Pro2
          specs: Ion mobility, dia-PASEF, high throughput

- science: Biology
  topic: Cell Analysis
  technologies:
    - technology: Flow Cytometry & Sorting
      description: Count, characterize, and isolate cells by surface markers
      toys:
        - toy: BD / Sony Cell Sorters
          specs: Multi-color FACS, rare cell isolation, high speed
    - technology: Metabolic Analysis
      description: Measure cellular respiration and glycolysis in real time
      toys:
        - toy: Seahorse XF Analyzer
          specs: Oxygen consumption rate, extracellular acidification

- science: Biology
  topic: Microscopy
  technologies:
    - technology: Confocal
      description: Optical sectioning by laser scanning for 3D fluorescence imaging
      toys:
        - toy: Leica SP8 LIGHTNING Confocal
          specs: Adaptive deconvolution, 5 laser lines, spectral detection
    - technology: Two-Photon
      description: Deep-tissue imaging via nonlinear excitation in thick samples
      toys:
        - toy: Scientifica Two-Photon System
          specs: 900+ nm excitation, live animal, 1 mm penetration
    - technology: Super-Resolution
      description: Bypass the diffraction limit for nanoscale cellular structures
      toys:
        - toy: STED / SIM Systems
          specs: Sub-100 nm resolution, fixed and live cells
    - technology: Light Sheet
      description: Rapid volumetric imaging of whole organisms with minimal bleaching
      toys:
        - toy: LaVision BioTec Light Sheet
          specs: Cleared tissue, whole embryo, dual-sided illumination

# ═══════════════════════════════════════════════════════════════
# ASTRONOMY
# ═══════════════════════════════════════════════════════════════

- science: Astronomy
  topic: Observational Astronomy
  technologies:
    - technology: Optical Telescope
      description: Visual and CCD imaging of stars, planets, and deep-sky objects
      toys:
        - toy: MacLean Observatory
          specs: 22" and 14" telescopes, CCD cameras
    - technology: Stellar Spectroscopy
      description: Chemical composition, temperature, and redshift from starlight
      toys:
        - toy: Spectrometer
          specs: Diffraction grating, wavelength calibration, line identification
    - technology: Radio Observation
      description: Detect radio emission from pulsars, galaxies, and cosmic hydrogen
      toys:
        - toy: Radio / Survey Arrays
          specs: 21 cm hydrogen mapping, transient detection

- science: Astronomy
  topic: Computational Astronomy
  technologies:
    - technology: Orbit Simulation
      description: N-body dynamics, mission planning, and ephemeris computation
      toys:
        - toy: REBOUND / AstroPy
          specs: Gravitational integrators, Horizons interface
    - technology: Image Processing
      description: Stack, calibrate, and extract photometry from astronomical images
      toys:
        - toy: AstroPy / Photometry Pipelines
          specs: Flat/dark calibration, aperture photometry, WCS alignment
