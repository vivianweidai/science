# Toys (scientific instruments & technologies) — single source of truth.
# Run `python archives/LAYOUT/build_toys.py` after edits to regenerate JSON.
#
# Three-level schema:
#   science:      Biology | Chemistry | Physics | Computing |        (required)
#                 Mathematics | Astronomy
#   topic:        string — top-level heading (e.g. Vibrational Spectroscopy) (required)
#   technologies: list of techniques within this topic                (required)
#     - technology:   string — technique name (e.g. Infrared)         (required)
#       description:  string — what this technique does               (required)
#       toys:         list of specific instruments                    (optional — omit if no specific toys)
#         - toy:          string — instrument name                    (required)
#           specs:        string — key specs                          (required)
#           highlighted:  true                                        (optional)
#           available:    true                                        (optional)
#           completed:    "YYYYMMDD Project Name"                     (optional — links to project page)
#           url:          string — external URL                       (optional — links toy name to any URL)

# ═══════════════════════════════════════════════════════════════
# MATHEMATICS
# ═══════════════════════════════════════════════════════════════

- science: Mathematics
  topic: Computation
  description: Symbolic and numerical problem solving
  technologies:
    - technology: Symbolic
      description: Exact algebra and machine-verified proofs
      toys:
        - toy: Wolfram Alpha
          specs: Symbolic engine with built-in mathematical knowledge
          available: true
          url: https://www.wolframcloud.com/obj/jamesdai/Published/exoplanets.nb
        - toy: Lean
          specs: Dependent type theory with the Mathlib library
    - technology: Numerical
      description: Arrays, solvers and vectorized computation
      toys:
        - toy: NumPy
          specs: N-dimensional arrays and linear algebra
          available: true
        - toy: SciPy
          specs: ODE integration, minimization and Fourier transforms
          available: true

- science: Mathematics
  topic: Visualization
  description: Turning data and equations into figures
  technologies:
    - technology: Graphing
      description: Publication-quality figures from data
      toys:
        - toy: Matplotlib
          specs: Python 2D and 3D plotting
          available: true
    - technology: Typesetting
      description: Professional documents with perfect equations
      toys:
        - toy: LaTeX
          specs: Equations, references and bibliographies
          available: true

# ═══════════════════════════════════════════════════════════════
# COMPUTING
# ═══════════════════════════════════════════════════════════════

- science: Computing
  topic: Data Science
  description: Extract patterns and signals from data
  technologies:
    - technology: Machine Learning
      description: Models that learn patterns from data
      toys:
        - toy: scikit-learn
          specs: Classical ML — regression, classification, clustering
          available: true
        - toy: PyTorch
          specs: Deep learning with GPU-accelerated training
          available: true
    - technology: Statistical Analysis
      description: Test hypotheses and quantify uncertainty
      toys:
        - toy: SciPy
          specs: Hypothesis tests, distributions and confidence intervals
          highlighted: true
          available: true
          completed: "20250225 Catfood"
        - toy: R
          specs: Statistical modeling and Bayesian inference

- science: Computing
  topic: Documentation
  description: Tools to share and reproduce work
  technologies:
    - technology: Repository
      description: Every change tracked, versioned and open
      toys:
        - toy: GitHub
          specs: Git repos, pull requests and issue tracking
          available: true
          url: https://github.com/vivianweidai
        - toy: Jupyter
          specs: Notebooks combining code, figures and narrative
          available: true
          completed: "20260401 IR Spectroscopy"
    - technology: Reproducibility
      description: Anyone can rerun and get the same result
      toys:
        - toy: Docker
          specs: Containers that freeze every dependency
        - toy: Zenodo
          specs: Permanent DOI archive for datasets and code

# ═══════════════════════════════════════════════════════════════
# PHYSICS
# ═══════════════════════════════════════════════════════════════


- science: Physics
  topic: Measurement
  description: Precision measurement of physical quantities
  technologies:
    - technology: Electronics
      description: Voltage, current and resistance in circuits and materials
      toys:
        - toy: Oscilloscope
          specs: Waveforms in time and frequency
        - toy: Four-Point Probe
          specs: Sheet resistance of thin films
          highlighted: true
          available: true
          completed: "20260404 Four Point Probe"
    - technology: Optics
      description: Produce and analyze light to reveal structure
      toys:
        - toy: Laser
          specs: Coherent light for alignment and interference
        - toy: Spectrometer
          specs: Atomic emission lines by wavelength
        - toy: Interferometer
          specs: Wavelength and refractive index by beam splitting

- science: Physics
  topic: Neuroimaging
  description: Record brain activity and neural structure
  technologies:
    - technology: Electrical
      description: Neural signals at millisecond resolution
      toys:
        - toy: EEG
          specs: Scalp electrodes — event-related potentials
        - toy: MEG
          specs: Magnetometer array — source-localized signals
    - technology: Blood Flow
      description: Brain activity via oxygenation changes
      toys:
        - toy: fNIRS
          specs: Portable near-infrared cortical mapping
        - toy: 3T MRI
          specs: Structural and functional brain imaging

# ═══════════════════════════════════════════════════════════════
# CHEMISTRY
# ═══════════════════════════════════════════════════════════════

- science: Chemistry
  topic: Spectroscopy
  description: Identify molecules by how they interact with light
  technologies:
    - technology: Vibrational
      description: Identify molecular bonds by how they vibrate
      toys:
        - toy: IR Spectrometer
          specs: Polar bonds reveal functional groups
          highlighted: true
          available: true
          completed: "20260401 IR Spectroscopy"
        - toy: Raman Microscope
          specs: Nonpolar bonds and aromatic rings — complements IR
          available: true
    - technology: Electronic
      description: Measure how molecules absorb and emit UV-Visible light
      toys:
        - toy: Spectrophotometer
          specs: Absorption — concentration, color and conjugation
          available: true
        - toy: Spectrofluorometer
          specs: Emission — probes excited-state dynamics
          available: true
    - technology: Chiroptical
      description: Distinguish left-handed from right-handed molecules
      toys:
        - toy: CD Spectrometer
          specs: Protein folding — helix, sheet and coil content
          available: true
        - toy: Polarimeter
          specs: Optical rotation angle — chiral sample purity
          available: true
    - technology: Magnetic Resonance
      description: Read nuclear and electron spin signals in a magnetic field
      toys:
        - toy: NMR Spectrometer
          specs: Which atoms connect to which — full molecular structure
          available: true
        - toy: EPR Spectrometer
          specs: Unpaired electrons — radicals, metal oxidation states
          available: true

- science: Chemistry
  topic: Analytical Chemistry
  description: Separate, identify and quantify compounds
  technologies:
    - technology: Chromatography
      description: Separate mixtures into individual components
      toys:
        - toy: Thin Layer
          specs: Cheap and fast — monitor reactions on silica plates under UV
        - toy: Liquid
          specs: Analytical and preparative separation with UV detection
          available: true
        - toy: Gas
          specs: Volatile compound separation with flame ionization
          available: true
    - technology: Mass Spectrometry
      description: Identify molecules by weighing them
      toys:
        - toy: Gas
          specs: Volatile molecules — fragment fingerprints from library spectra
          available: true
        - toy: Liquid
          specs: Nonvolatile molecules — molecular weight via electrospray
          available: true
        - toy: Laser
          specs: Intact polymers and biomolecules — laser desorption from solid matrix
          available: true
        - toy: Plasma
          specs: Trace elements — atoms not molecules, parts-per-billion sensitivity
          available: true
    - technology: Thermal Analysis
      description: Heat samples and measure what happens
      toys:
        - toy: Melting Point
          specs: Capillary method — identity and purity from melting temperature range
          highlighted: true
          available: true
          completed: "20260405 Melting Point"
        - toy: Thermogravimetry
          specs: Mass loss versus temperature — decomposition and moisture
          available: true
        - toy: Calorimetry
          specs: Energy flow versus temperature — glass transitions and phase changes
          available: true
    - technology: X-Ray Diffraction
      description: Bounce X-rays off crystals to reveal atomic structure
      toys:
        - toy: Powder
          specs: Phase identification and lattice parameters
          available: true
        - toy: Single-Crystal
          specs: Complete 3D atomic coordinates from a single crystal
          available: true
    - technology: Scanning Microscope
      description: Drag a sharp tip across a surface to map atomic structure
      toys:
        - toy: Atomic Force
          specs: Nanometer-resolution height maps in any environment
          available: true
        - toy: Tunneling
          specs: Atomic-resolution maps of conductive surfaces
          available: true


- science: Chemistry
  topic: Synthesis and Preparation
  description: Prepare samples and run chemical reactions
  technologies:
    - technology: Microwave Reactor
      description: Accelerate chemical reactions with rapid sealed-vessel heating under pressure
      toys:
        - toy: Microwave Reactor
          specs: 300 W, 300 °C, 20 bar, single-mode cavity
          available: true
    - technology: Ozone Generator
      description: Cleave carbon-carbon double bonds by oxidation with ozone gas
      toys:
        - toy: Ozone Generator
          specs: Bench-scale ozone production for organic synthesis
          available: true
    - technology: Centrifuge
      description: Separate mixtures by spinning them at high speed so denser components sink
      toys:
        - toy: Centrifuge
          specs: 500–15,000 rpm, refrigerated, temperature-controlled
          highlighted: true
          available: true
          completed: "20260411 Centrifuge"
    - technology: pH Measurement
      description: Measure how acidic or basic a solution is
      toys:
        - toy: pH Meter
          specs: Benchtop electrode with 3-point buffer calibration
          highlighted: true
          available: true
          completed: "20260411 Centrifuge"
    - technology: Ultrapure Water
      description: Produce contaminant-free water for sensitive experiments
      toys:
        - toy: Water Purification System
          specs: 18.2 MΩ·cm Type 1 reagent-grade water with UV oxidation
          available: true
    - technology: Analytical Balance
      description: Weigh samples with precision down to hundredths of a milligram
      toys:
        - toy: Analytical Balance
          specs: 0.01 mg readability with internal calibration
          available: true

# ═══════════════════════════════════════════════════════════════
# BIOLOGY
# ═══════════════════════════════════════════════════════════════

- science: Biology
  topic: Molecular Biology
  description: DNA, RNA and proteins at the molecular scale
  technologies:
    - technology: PCR
      description: Amplify specific DNA sequences for detection and cloning
      toys:
        - toy: miniPCR Thermal Cycler
          specs: 96-well, portable, Bluetooth-connected
    - technology: Protein Expression
      description: Produce proteins from DNA templates in cell-free systems
      toys:
        - toy: BioBits Cell-Free System
          specs: In vitro transcription-translation, fluorescent reporters
    - technology: Gel / Plate Detection
      description: Visualize gene expression products by fluorescence or absorbance
      toys:
        - toy: P51 Fluorescence Viewer
          specs: Blue/green excitation, gel and plate imaging

- science: Biology
  topic: Genomics
  description: Sequence and profile whole genomes
  technologies:
    - technology: Short-Read Sequencing
      description: Massively parallel sequencing for genome and transcriptome profiling
      toys:
        - toy: Illumina NextSeq 2000
          specs: Up to 400M reads/run, 2×150 bp paired-end
    - technology: Long-Read Sequencing
      description: Full-length reads for structural variants and complete transcripts
      toys:
        - toy: PacBio / Oxford Nanopore
          specs: 10–100 kb reads, direct RNA sequencing
    - technology: Single-Cell Genomics
      description: Profile gene expression in individual cells
      toys:
        - toy: 10x Chromium
          specs: Droplet-based scRNA-seq, cell-type clustering
    - technology: Quantitative PCR
      description: Measure target copy number and gene expression levels
      toys:
        - toy: QuantStudio 3
          specs: Real-time qPCR, 96-well, SYBR/TaqMan

- science: Biology
  topic: Proteomics
  description: Identify and quantify cellular proteins
  technologies:
    - technology: Tandem Mass Spectrometry
      description: Identify and quantify proteins by fragmentation
      toys:
        - toy: Thermo Orbitrap Eclipse
          specs: LC-MS/MS, TMT labeling, phosphoproteomics
        - toy: Bruker timsTOF Pro2
          specs: Ion mobility, dia-PASEF, high throughput

- science: Biology
  topic: Cell Analysis
  description: Sort, count and characterize individual cells
  technologies:
    - technology: Flow Cytometry & Sorting
      description: Count, characterize and isolate cells by surface markers
      toys:
        - toy: BD / Sony Cell Sorters
          specs: Multi-color FACS, rare cell isolation, high speed
    - technology: Metabolic Analysis
      description: Measure cellular respiration and glycolysis in real time
      toys:
        - toy: Seahorse XF Analyzer
          specs: Oxygen consumption rate, extracellular acidification

- science: Biology
  topic: Microscopy
  description: High-resolution optical imaging of cells
  technologies:
    - technology: Confocal
      description: Optical sectioning by laser scanning for 3D fluorescence imaging
      toys:
        - toy: Leica SP8 LIGHTNING Confocal
          specs: Adaptive deconvolution, 5 laser lines, spectral detection
    - technology: Two-Photon
      description: Deep-tissue imaging via nonlinear excitation in thick samples
      toys:
        - toy: Scientifica Two-Photon System
          specs: 900+ nm excitation, live animal, 1 mm penetration
    - technology: Super-Resolution
      description: Bypass the diffraction limit for nanoscale cellular structures
      toys:
        - toy: STED / SIM Systems
          specs: Sub-100 nm resolution, fixed and live cells
    - technology: Light Sheet
      description: Rapid volumetric imaging of whole organisms with minimal bleaching
      toys:
        - toy: LaVision BioTec Light Sheet
          specs: Cleared tissue, whole embryo, dual-sided illumination

- science: Biology
  topic: Electron Microscopy
  description: Nanoscale imaging with focused electron beams
  technologies:
    - technology: Scanning Electron
      description: Scan a focused electron beam across a surface to image morphology and map elements
      toys:
        - toy: SEM
          specs: Secondary and backscatter imaging, EDS elemental mapping
        - toy: FIB-SEM
          specs: Focused ion beam for cross-sectioning and site-specific TEM sample prep
    - technology: Transmission Electron
      description: Transmit electrons through an ultra-thin specimen to reveal internal nanostructure
      toys:
        - toy: TEM
          specs: 200 kV, lattice imaging, electron diffraction and EDS analysis

# ═══════════════════════════════════════════════════════════════
# ASTRONOMY
# ═══════════════════════════════════════════════════════════════

- science: Astronomy
  topic: Observational Astronomy
  description: Observe the sky across wavelengths
  technologies:
    - technology: Optical Telescope
      description: Visual and CCD imaging of stars, planets and deep-sky objects
      toys:
        - toy: MacLean Observatory
          specs: 22" and 14" telescopes, CCD cameras
    - technology: Stellar Spectroscopy
      description: Chemical composition, temperature and redshift from starlight
      toys:
        - toy: Spectrometer
          specs: Diffraction grating, wavelength calibration, line identification
    - technology: Radio Observation
      description: Detect radio emission from pulsars, galaxies and cosmic hydrogen
      toys:
        - toy: Radio / Survey Arrays
          specs: 21 cm hydrogen mapping, transient detection

- science: Astronomy
  topic: Computational Astronomy
  description: Simulate orbits and process sky images
  technologies:
    - technology: Orbit Simulation
      description: N-body dynamics, mission planning and ephemeris computation
      toys:
        - toy: REBOUND / AstroPy
          specs: Gravitational integrators, Horizons interface
    - technology: Image Processing
      description: Stack, calibrate and extract photometry from astronomical images
      toys:
        - toy: AstroPy / Photometry Pipelines
          specs: Flat/dark calibration, aperture photometry, WCS alignment
