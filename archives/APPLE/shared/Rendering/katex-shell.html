<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, { delimiters: [
    {left: '$$', right: '$$', display: true},
    {left: '$',  right: '$',  display: false}
  ], throwOnError: false });"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    margin: 0;
    padding: 16px;
  }
  table { border-collapse: collapse; width: 100%; margin: 12px 0; }
  th, td { border: 1px solid #8886; padding: 6px 10px; text-align: left; vertical-align: top; }
  th { background: #8881; }
  h1 { font-size: 1.4em; margin: 0 0 12px; }
  .katex { font-size: 1em; }
  img { max-width: 100%; height: auto; border-radius: 8px; margin: 4px 0; }
  .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 12px 0; }
  .photo-grid img { width: 100%; height: auto; object-fit: cover; border-radius: 6px; }
  .hero-single img { max-width: 100%; height: auto; max-height: 300px; object-fit: cover; border-radius: 8px; }
  .shuffle-btn { display: none; }
  .project-meta { text-align: right; color: #888; font-size: 0.9em; margin: 8px 0 16px; }
  .footer { display: none; }
</style>
</head>
<body>
<div id="content"></div>
<script>
  window.renderMarkdown = function(md) {
    document.getElementById('content').innerHTML = marked.parse(md);
    if (window.renderMathInElement) {
      renderMathInElement(document.body, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$',  right: '$',  display: false}
        ],
        throwOnError: false
      });
    }
  };
</script>
</body>
</html>
