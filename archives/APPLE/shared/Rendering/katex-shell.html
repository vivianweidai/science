<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, { delimiters: [
    {left: '$$', right: '$$', display: true},
    {left: '$',  right: '$',  display: false}
  ], throwOnError: false });"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
  /* Table styling mirrors archives/LAYOUT/curriculum.css .curr-topic-body
     so iOS curriculum tables feel like the webapp: gray headers, bordered
     cells, centered text, zebra stripes, and a highlighted first column.
     Colors use CSS variables so dark mode tones down rather than inverts. */

  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1f2328;
    --muted: #656d76;
    --border: #d1d9e0;
    --th-bg: #c0c4c8;
    --td-first-bg: #d5d8dc;
    --zebra-bg: #f6f8fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --fg: #e6edf3;
      --muted: #8b949e;
      --border: #30363d;
      --th-bg: #2d333b;
      --td-first-bg: #22272e;
      --zebra-bg: #1a1d21;
    }
  }

  body {
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    margin: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--fg);
  }

  h1 { font-size: 1.4em; margin: 0 0 12px; }
  h2 { font-size: 1.15em; margin: 16px 0 8px; }
  h3 { font-size: 1.02em; margin: 14px 0 6px; }

  /* Curriculum-style tables: gray header, bordered cells, centered,
     zebra-striped data rows, highlighted rows, and group-label cells
     that may span multiple rows via rowspan. Avoids `:first-child`
     because rowspan-merged rows remove their first cell from the DOM,
     which would promote the A column into `:first-child` position. */
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 10px 0 16px;
    font-size: 0.93em;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: center;
    vertical-align: middle;
  }
  th {
    background: var(--th-bg);
    font-weight: 700;
    font-size: 0.98em;
  }

  /* Group-label cell (class added at render time to every first cell
     before rowspan merging). Kept as its own class so zebra striping
     and highlight rules can exclude it via :not(.curr-group-cell). */
  td.curr-group-cell {
    background: var(--td-first-bg);
    font-weight: 600;
  }

  /* Zebra stripe data cells on even rows only. */
  tr:nth-child(even) td:not(.curr-group-cell) {
    background: var(--zebra-bg);
  }

  /* Full-width table-name header row injected at render time for
     curriculum tables — matches the webapp's mergeHeaders() behaviour. */
  tr.curr-table-name th {
    font-size: 1.05em;
    padding: 8px 10px;
  }

  /* Highlighted rows from curriculum.json `highlighted_rows` — mirror
     .curr-topic-body tr.highlight from archives/LAYOUT/curriculum.css. */
  :root { --highlight-bg: #fff056; }
  @media (prefers-color-scheme: dark) {
    :root { --highlight-bg: #7a6b00; }
  }
  tr.highlight td:not(.curr-group-cell) {
    background: var(--highlight-bg) !important;
  }

  .katex { font-size: 1em; }
  img { max-width: 100%; height: auto; border-radius: 8px; margin: 4px 0; }
  .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 12px 0; }
  .photo-grid img { width: 100%; height: auto; object-fit: cover; border-radius: 6px; }
  .hero-single img { max-width: 100%; height: auto; max-height: 300px; object-fit: cover; border-radius: 8px; }
  .shuffle-btn { display: none; }
  .project-meta { text-align: right; color: var(--muted); font-size: 0.9em; margin: 8px 0 16px; }
  .footer { display: none; }
</style>
</head>
<body>
<div id="content"></div>
<script>
  /// Render a markdown document into #content.
  ///
  /// Accepts either a raw string (legacy call sites like ResearchView's
  /// project markdown) or an options object of shape:
  ///   { markdown: string, tableName?: string, highlightedRows?: [int] }
  ///
  /// For curriculum tables (tableName given) we:
  ///   1. Strip the Jekyll YAML front matter (`---\n...\n---`) so it
  ///      doesn't render as prose above the table.
  ///   2. Hide the leading <h1> that duplicates the table name.
  ///   3. Remove the original column-header row (Label / Formula / Description).
  ///   4. Prepend a full-width "curr-table-name" row containing the
  ///      table name.
  ///   5. Mark every first-column data cell with `curr-group-cell` and
  ///      merge consecutive cells with identical values into a single
  ///      rowspan cell, matching the webapp's group merging.
  ///   6. Apply a `.highlight` class to data rows listed in
  ///      `highlightedRows` (0-indexed over data rows).
  window.renderMarkdown = function(arg) {
    var md = typeof arg === 'string' ? arg : (arg && arg.markdown) || '';
    var tableName = (typeof arg === 'object' && arg && arg.tableName) || null;
    var highlightedRows = (typeof arg === 'object' && arg && arg.highlightedRows) || [];

    // Strip YAML front matter. The webapp's Jekyll layer does this; iOS
    // fetches raw markdown directly so we have to do it here.
    md = md.replace(/^---\s*\n[\s\S]*?\n---\s*\n?/, '');

    var content = document.getElementById('content');
    content.innerHTML = marked.parse(md);

    if (tableName) {
      var h1 = content.querySelector('h1');
      if (h1) h1.style.display = 'none';

      var table = content.querySelector('table');
      if (table) {
        // Step 1: remove the column-header row. Markdown tables parsed
        // by marked.js always emit the first row as <tr> with <th>
        // cells (wrapped in a <thead>).
        var firstRow = table.rows[0];
        if (firstRow && firstRow.cells[0] &&
            firstRow.cells[0].tagName.toUpperCase() === 'TH') {
          firstRow.parentNode.removeChild(firstRow);
        }

        // Step 2: compute colspan from the first remaining data row.
        var sampleRow = table.rows[0];
        var colspan = sampleRow ? sampleRow.cells.length : 3;

        // Step 3: tag first-column cells with curr-group-cell so the
        // CSS rules for gray background and zebra-stripe exclusion
        // apply correctly even after rowspan merging.
        for (var r = 0; r < table.rows.length; r++) {
          var firstCell = table.rows[r].cells[0];
          if (firstCell) firstCell.classList.add('curr-group-cell');
        }

        // Step 4: merge consecutive rows with identical first-cell
        // text into rowspans.
        var dataRows = Array.prototype.slice.call(table.rows);
        var i = 0;
        while (i < dataRows.length) {
          var firstCell = dataRows[i].cells[0];
          if (!firstCell) { i++; continue; }
          var groupText = firstCell.textContent.trim();
          var j = i + 1;
          while (j < dataRows.length) {
            var nextFirst = dataRows[j].cells[0];
            if (!nextFirst || nextFirst.textContent.trim() !== groupText) break;
            nextFirst.parentNode.removeChild(nextFirst);
            j++;
          }
          if (j > i + 1) {
            firstCell.rowSpan = j - i;
          }
          i = j;
        }

        // Step 5: prepend the table-name header row (above all data
        // rows). We do this after the rowspan merge so the merging
        // logic doesn't need to skip it.
        var headerRow = document.createElement('tr');
        headerRow.className = 'curr-table-name';
        var th = document.createElement('th');
        th.setAttribute('colspan', colspan);
        th.textContent = tableName;
        headerRow.appendChild(th);
        var insertionTarget = table.rows[0];
        if (insertionTarget && insertionTarget.parentNode) {
          insertionTarget.parentNode.insertBefore(headerRow, insertionTarget);
        } else {
          table.appendChild(headerRow);
        }
      }
    }

    if (highlightedRows && highlightedRows.length) {
      var table = content.querySelector('table');
      if (table) {
        // After our transformations: row 0 is the curr-table-name row,
        // rows 1..N are the data rows in their manifest order.
        var allRows = Array.prototype.slice.call(table.rows);
        var hasNameRow = allRows[0] && allRows[0].className === 'curr-table-name';
        var dataRowStart = hasNameRow ? 1 : 0;
        highlightedRows.forEach(function (i) {
          var row = allRows[dataRowStart + i];
          if (row) row.classList.add('highlight');
        });
      }
    }

    if (window.renderMathInElement) {
      renderMathInElement(document.body, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$',  right: '$',  display: false}
        ],
        throwOnError: false
      });
    }

    // Let Swift know the final content height so MarkdownWebView can
    // size its frame (see MarkdownWebView.render's evaluateJavaScript
    // completion handler, which reads this).
    if (window.webkit && window.webkit.messageHandlers &&
        window.webkit.messageHandlers.contentHeight) {
      window.webkit.messageHandlers.contentHeight.postMessage(
        document.body.scrollHeight
      );
    }
  };
</script>
</body>
</html>
