<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, { delimiters: [
    {left: '$$', right: '$$', display: true},
    {left: '$',  right: '$',  display: false}
  ], throwOnError: false });"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
  /* Table styling mirrors archives/layout/curriculum.css .curr-topic-body
     so iOS curriculum tables feel like the webapp: gray headers, bordered
     cells, centered text, zebra stripes, and a highlighted first column.
     Colors use CSS variables so dark mode tones down rather than inverts. */

  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1f2328;
    --muted: #656d76;
    --border: #d1d9e0;
    --group-border: #b0b4b8; /* darker than --border so group-cell seams show up against the gray first column */
    --th-bg: #c0c4c8;
    --td-first-bg: #d5d8dc;
    --zebra-bg: #f6f8fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --fg: #e6edf3;
      --muted: #8b949e;
      --border: #30363d;
      --group-border: #4a515b;
      --th-bg: #2d333b;
      --td-first-bg: #22272e;
      --zebra-bg: #1a1d21;
    }
  }

  body {
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    margin: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--fg);
  }

  h1 { font-size: 1.4em; margin: 0 0 12px; }
  h2 { font-size: 1.15em; margin: 16px 0 8px; }
  h3 { font-size: 1.02em; margin: 14px 0 6px; }

  /* Curriculum-style tables: gray header, bordered cells, centered,
     zebra-striped data rows, highlighted rows, and group-label cells
     that may span multiple rows via rowspan. Avoids `:first-child`
     because rowspan-merged rows remove their first cell from the DOM,
     which would promote the A column into `:first-child` position. */
  table {
    border-collapse: collapse;
    width: 100%;
    max-width: 100%;
    /* Fixed layout so long URL strings and instrument names can't
       push the table wider than the viewport. Without this, a
       non-breaking string in one cell drifts the whole page. */
    table-layout: fixed;
    margin: 10px 0 16px;
    font-size: 0.93em;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: center;
    vertical-align: middle;
    /* Let long URL strings, long molecule names, etc. wrap mid-word
       rather than overflow. Research-project Extension tables lean on
       this because their cells often carry multi-part instrument
       names. */
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  th {
    background: var(--th-bg);
    font-weight: 700;
    font-size: 0.98em;
  }

  /* Group-label cell (class added at render time to every first cell
     before rowspan merging). Kept as its own class so zebra striping
     and highlight rules can exclude it via :not(.curr-group-cell).
     The bottom border is a shade darker than the normal cell border
     so the seam between adjacent rowspan-merged group cells stays
     visible against the gray background — matches the webapp's
     `.curr-topic-body td.curr-group-cell` rule in curriculum.css. */
  td.curr-group-cell {
    background: var(--td-first-bg);
    font-weight: 600;
    border-bottom-color: var(--group-border);
  }

  /* Zebra stripe data cells on even rows only. */
  tr:nth-child(even) td:not(.curr-group-cell) {
    background: var(--zebra-bg);
  }

  /* Full-width table-name header row injected at render time for
     curriculum tables — matches the webapp's mergeHeaders() behaviour. */
  tr.curr-table-name th {
    font-size: 1.05em;
    padding: 8px 10px;
  }

  /* Highlighted rows from curriculum.json `highlighted_rows` — mirror
     .curr-topic-body tr.highlight from archives/layout/curriculum.css. */
  :root { --highlight-bg: #fff056; }
  @media (prefers-color-scheme: dark) {
    :root { --highlight-bg: #7a6b00; }
  }
  tr.highlight td:not(.curr-group-cell) {
    background: var(--highlight-bg) !important;
  }

  /* Subject chip pills used by research project pages (e.g.
     `<span class="chip math">Mathematics</span>`). Mirrors the webapp
     rule in archives/layout/base.css so project headers render with
     the same colored pills as the site. Subject color variables
     match the pastel palette from base.css :root. */
  :root {
    --subj-math:  #c5d9f7;
    --subj-comp:  #d9ccee;
    --subj-phys:  #f9c4a8;
    --subj-chem:  #d4e8a0;
    --subj-bio:   #a8ddd4;
    --subj-astro: #f4c2cb;
  }
  .chip {
    display: inline-block; padding: 1px 7px; border-radius: 999px;
    font-size: .72em; font-weight: 600; color: #1f2328;
    text-align: center; white-space: nowrap; line-height: 1.6;
    vertical-align: middle;
  }
  .chip.math  { background: var(--subj-math); }
  .chip.comp  { background: var(--subj-comp); }
  .chip.phys  { background: var(--subj-phys); }
  .chip.chem  { background: var(--subj-chem); }
  .chip.bio   { background: var(--subj-bio); }
  .chip.astro { background: var(--subj-astro); }
  .project-title { display: flex; align-items: center; gap: 0.6em; flex-wrap: wrap; }
  .project-title h1 { border-bottom: none; padding-bottom: 0; margin: 0; }
  .project-chips { display: inline-flex; gap: 4px; }

  .katex { font-size: 1em; }
  img { max-width: 100%; height: auto; border-radius: 8px; margin: 4px 0; }
  /* Phone-width native shell: photos flow in a single column. The
     webapp uses a 2-col grid, but at 390-430pt wide each column is
     too narrow to read the photo content — single column reads
     cleanly on both iPhone and Pixel. */
  .photo-grid { display: block; margin: 12px 0; }
  .photo-grid img { display: block; width: 100%; height: auto; object-fit: cover; border-radius: 6px; margin: 0 0 6px; }
  /* Instrument tables on research project pages. The webapp sets the
     row color via an inline <style> per page; our `stripJekyllSyntax`
     removes those, so we replicate the canonical behavior here. Uses
     the project-wide canonical highlight yellow (#fff056), matching
     the curriculum table highlight and olympiad row highlight.
     `.no-highlight` (Extensions sections) opts out. */
  .instrument-table tbody tr td { background: #fff056; }
  .instrument-table.no-highlight tbody tr td { background: transparent; }
  .hero-single img { max-width: 100%; height: auto; max-height: 300px; object-fit: cover; border-radius: 8px; }
  .shuffle-btn { display: none; }

  /* Project pages ship tabbed result browsers (UV-Vis, IR) built from
     CSS `:checked` radios + .tab-labels + .tab-content blocks. Without
     the webapp's tabs.css those toggles don't fire, so every content
     panel would collapse. Flatten instead: hide the radios and the
     label strip, and show every .tab-content in document order —
     matches the user's request to "list them one after another". A JS
     pass below also injects each tab's label as an <h4> heading so the
     reader still knows which sample/spectrum a block refers to. */
  .tabs input[type="radio"] { display: none; }
  .tabs .tab-labels { display: none; }
  .tabs .tab-content { display: block; margin: 10px 0 18px; }
  .tabs .tab-content > .tab-heading {
    font-size: 1em; font-weight: 700; margin: 0 0 6px;
    color: var(--fg);
  }
  .project-meta { text-align: right; color: var(--muted); font-size: 0.9em; margin: 8px 0 16px; }
  .footer { display: none; }
  /* Project pages begin with a `.page-header` div duplicating the
     tab-bar nav ("Research · Curriculum · Olympiads · Research").
     Inside the iOS app the TabView already carries that navigation,
     so the header is pure noise — hide it and let the project title
     be the first thing the reader sees. */
  .page-header { display: none; }
</style>
</head>
<body>
<div id="content"></div>
<script>
  /// Render a markdown document into #content.
  ///
  /// Accepts either a raw string (legacy call sites like ResearchView's
  /// project markdown) or an options object of shape:
  ///   { markdown: string, tableName?: string, highlightedRows?: [int] }
  ///
  /// For curriculum tables (tableName given) we:
  ///   1. Strip the Jekyll YAML front matter (`---\n...\n---`) so it
  ///      doesn't render as prose above the table.
  ///   2. Hide the leading <h1> that duplicates the table name.
  ///   3. Remove the original column-header row (Label / Formula / Description).
  ///   4. Prepend a full-width "curr-table-name" row containing the
  ///      table name.
  ///   5. Mark every first-column data cell with `curr-group-cell` and
  ///      merge consecutive cells with identical values into a single
  ///      rowspan cell, matching the webapp's group merging.
  ///   6. Apply a `.highlight` class to data rows listed in
  ///      `highlightedRows` (0-indexed over data rows).
  window.renderMarkdown = function(arg) {
    var md = typeof arg === 'string' ? arg : (arg && arg.markdown) || '';
    var tableName = (typeof arg === 'object' && arg && arg.tableName) || null;
    var highlightedRows = (typeof arg === 'object' && arg && arg.highlightedRows) || [];

    // Strip YAML front matter. The webapp's Jekyll layer does this; iOS
    // fetches raw markdown directly so we have to do it here.
    md = md.replace(/^---\s*\n[\s\S]*?\n---\s*\n?/, '');

    // Unwrap kramdown `<div markdown="1">…</div>` containers. The webapp
    // uses this attribute to tell kramdown "parse markdown inside this
    // HTML block"; marked.js doesn't understand it and leaves the
    // enclosed markdown as raw text (visible URLs in link syntax, no
    // table parsing, etc.). Native `stripJekyllSyntax` does this too,
    // but running the pass here as well makes the shell robust to any
    // regex drift on the native side — and is the layer we can most
    // easily iterate on.
    md = md.replace(
      /<div[^>]*\bmarkdown\s*=\s*["']1["'][^>]*>([\s\S]*?)<\/div>/g,
      '$1'
    );
    // Any inline `<style>` tags Jekyll would render into the page
    // head. marked would otherwise emit them into #content and they'd
    // leak into the rendered body as visible text on some pages.
    md = md.replace(/<style[\s\S]*?<\/style>/g, '');

    var content = document.getElementById('content');
    content.innerHTML = marked.parse(md);

    if (tableName) {
      var h1 = content.querySelector('h1');
      if (h1) h1.style.display = 'none';

      var table = content.querySelector('table');
      if (table) {
        // Step 1: remove the column-header row. Markdown tables parsed
        // by marked.js always emit the first row as <tr> with <th>
        // cells (wrapped in a <thead>).
        var firstRow = table.rows[0];
        if (firstRow && firstRow.cells[0] &&
            firstRow.cells[0].tagName.toUpperCase() === 'TH') {
          firstRow.parentNode.removeChild(firstRow);
        }

        // Step 2: compute colspan from the first remaining data row.
        var sampleRow = table.rows[0];
        var colspan = sampleRow ? sampleRow.cells.length : 3;

        // Step 3: tag first-column cells with curr-group-cell so the
        // CSS rules for gray background and zebra-stripe exclusion
        // apply correctly even after rowspan merging.
        for (var r = 0; r < table.rows.length; r++) {
          var firstCell = table.rows[r].cells[0];
          if (firstCell) firstCell.classList.add('curr-group-cell');
        }

        // Step 4: merge consecutive rows with identical first-cell
        // text into rowspans.
        var dataRows = Array.prototype.slice.call(table.rows);
        var i = 0;
        while (i < dataRows.length) {
          var firstCell = dataRows[i].cells[0];
          if (!firstCell) { i++; continue; }
          var groupText = firstCell.textContent.trim();
          var j = i + 1;
          while (j < dataRows.length) {
            var nextFirst = dataRows[j].cells[0];
            if (!nextFirst || nextFirst.textContent.trim() !== groupText) break;
            nextFirst.parentNode.removeChild(nextFirst);
            j++;
          }
          if (j > i + 1) {
            firstCell.rowSpan = j - i;
          }
          i = j;
        }

        // Step 5: prepend the table-name header row (above all data
        // rows). We do this after the rowspan merge so the merging
        // logic doesn't need to skip it.
        var headerRow = document.createElement('tr');
        headerRow.className = 'curr-table-name';
        var th = document.createElement('th');
        th.setAttribute('colspan', colspan);
        th.textContent = tableName;
        headerRow.appendChild(th);
        var insertionTarget = table.rows[0];
        if (insertionTarget && insertionTarget.parentNode) {
          insertionTarget.parentNode.insertBefore(headerRow, insertionTarget);
        } else {
          table.appendChild(headerRow);
        }
      }
    }

    if (highlightedRows && highlightedRows.length) {
      var table = content.querySelector('table');
      if (table) {
        // After our transformations: row 0 is the curr-table-name row,
        // rows 1..N are the data rows in their manifest order.
        var allRows = Array.prototype.slice.call(table.rows);
        var hasNameRow = allRows[0] && allRows[0].className === 'curr-table-name';
        var dataRowStart = hasNameRow ? 1 : 0;
        highlightedRows.forEach(function (i) {
          var row = allRows[dataRowStart + i];
          if (row) row.classList.add('highlight');
        });
      }
    }

    // Flatten tabbed result blocks: for each `.tabs` container, pull
    // the label text keyed by radio id, and prepend it as an <h4>
    // inside the matching `#content-<id>` panel. See the tab CSS above
    // for the companion rules that unhide every panel.
    var tabGroups = content.querySelectorAll('.tabs');
    tabGroups.forEach(function (group) {
      var labels = {};
      group.querySelectorAll('.tab-labels label[for]').forEach(function (lbl) {
        var id = lbl.getAttribute('for');
        // Prefer the full-text span if present (e.g. `.label-full`),
        // otherwise fall back to the label's visible textContent.
        var full = lbl.querySelector('.label-full');
        labels[id] = (full ? full.textContent : lbl.textContent).trim();
      });
      group.querySelectorAll('.tab-content').forEach(function (panel) {
        var id = panel.id || '';
        // Content panels are named `content-<radio-id>`.
        var key = id.indexOf('content-') === 0 ? id.slice('content-'.length) : id;
        var title = labels[key];
        if (!title) return;
        var h = document.createElement('h4');
        h.className = 'tab-heading';
        h.textContent = title;
        panel.insertBefore(h, panel.firstChild);
      });
    });

    if (window.renderMathInElement) {
      renderMathInElement(document.body, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$',  right: '$',  display: false}
        ],
        throwOnError: false
      });
    }

    // Let the native host know the content height so MarkdownWebView
    // can size its frame. iOS posts via `webkit.messageHandlers`;
    // Android posts via the `AndroidBridge` JavaScript interface (see
    // MarkdownWebView.kt). The Apple and Android copies of this file
    // are kept byte-identical so edits copy-paste cleanly between them.
    // Heights are posted:
    //   1. Once right after parse (covers tables and non-image text).
    //   2. Each time an `<img>` finishes loading (the main source of
    //      late growth on project pages).
    //
    // Critically, the posted height is MONOTONIC: we never report a
    // height smaller than the last one. The native frame resizes in
    // response to each post, which causes the webview to reflow,
    // which a ResizeObserver would then pick up as a new height — that
    // feedback loop was making project pages jitter after the prior
    // fix. Images can only add pixels, so a grow-only policy is
    // correct for this content.
    var _lastHeight = 0;
    function postHeight() {
      var h = document.body.scrollHeight;
      if (h <= _lastHeight + 1) return;
      _lastHeight = h;
      if (window.webkit && window.webkit.messageHandlers &&
          window.webkit.messageHandlers.contentHeight) {
        window.webkit.messageHandlers.contentHeight.postMessage(h);
      } else if (window.AndroidBridge && window.AndroidBridge.postHeight) {
        // Android bridge: see MarkdownWebView.kt in the Android app.
        window.AndroidBridge.postHeight(h);
      }
    }
    _lastHeight = 0;
    postHeight();

    content.querySelectorAll('img').forEach(function (img) {
      if (!img.complete) {
        img.addEventListener('load', postHeight);
        img.addEventListener('error', postHeight);
      }
    });
  };
</script>
</body>
</html>
