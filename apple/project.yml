name: Science
options:
  bundleIdPrefix: com.vivianweidai
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  ScienceCore:
    path: .

targets:
  Science:
    type: application
    platform: iOS
    sources:
      - path: ios
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
    dependencies:
      - package: ScienceCore
        product: ScienceCoreUI
      - target: ScienceWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vivianweidai.science
        MARKETING_VERSION: "1.5.3"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: CR3TXC4TRW
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: Science
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO

  ScienceWatch:
    type: application
    platform: watchOS
    sources:
      - path: watch
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: ScienceCore
        product: ScienceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vivianweidai.science.watchkitapp
        MARKETING_VERSION: "1.5.3"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: CR3TXC4TRW
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Science
        INFOPLIST_KEY_WKApplication: "YES"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.vivianweidai.science
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
