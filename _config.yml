title: Vivian Dai
description: Mathematics Computing Physics Chemistry Biology Astronomy
baseurl: ""
plugins: []

# Keep Jekyll's scan small — apple/ is iOS source, the rest is dev cruft.
exclude:
  - apple/
  - .wrangler/
  - CLAUDE.md
  - MIGRATION.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/

# Curriculum markdown contains LaTeX math with `{{...}}` sequences that
# Jekyll's Liquid parser mis-interprets as variable syntax (fatal error in
# parallax.md etc.). Skip Liquid rendering for the whole curriculum tree.
# type: pages is required here — a bare path scope was silently ignored.
defaults:
  - scope:
      path: "curriculum"
      type: pages
    values:
      render_with_liquid: false
