title: Vivian Dai
description: Mathematics Computing Physics Chemistry Biology Astronomy
baseurl: ""
plugins: []

# Keep Jekyll's scan small — archives/APPLE/ is iOS/watchOS source.
exclude:
  - archives/APPLE/
  - CLAUDE.md
  - README.md
  # Curriculum data files contain LaTeX math with `{{...}}` that fatally
  # crashes Jekyll's Liquid parser (GitHub Pages uses Jekyll 3.10 which
  # does not support render_with_liquid: false). These .md files are only
  # consumed by build_curriculum.py → curriculum.json, not served as pages.
  - curriculum/astronomy/
  - curriculum/biology/
  - curriculum/chemistry/
  - curriculum/computing/
  - curriculum/mathematics/
  - curriculum/physics/
