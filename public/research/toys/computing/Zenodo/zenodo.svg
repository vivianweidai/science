<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 782" width="1600" height="782">
  <defs>
    <style>
      .tl-line   { stroke:#cdd5df; stroke-width:1.4; }
      .drop      { stroke:#cdd5df; stroke-width:1; stroke-dasharray:2 3; }
      .dot       { fill:#7d6bb3; }
      .dot-cur   { fill:#d95f5f; }
      .dot-ring  { fill:none; stroke:#d9ccee; stroke-width:6; }
      .card      { fill:#ffffff; stroke:#cdd5df; stroke-width:1; }
      .card-cur  { fill:#fdf2f2; stroke:#e1a8a8; stroke-width:1.2; }
      .ver       { fill:#1f2328; font-family:'Iowan Old Style','Charter',Georgia,serif; font-style:italic; font-size:22px; }
      .date      { fill:#374151; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:14px; }
      .doi       { fill:#7d6bb3; font-family:'SF Mono','Menlo',monospace; font-size:13px; letter-spacing:.01em; }
      .size      { fill:#9aa3af; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:12px; }
      .tick-lbl  { fill:#6b7280; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:13px; }
      .footer-l  { fill:#6b7280; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:14px; letter-spacing:.04em; text-transform:uppercase; }
      .footer-v  { fill:#1f2328; font-family:'SF Mono','Menlo',monospace; font-size:18px; }
      .title     { fill:#1f2328; font-family:'Iowan Old Style','Charter',Georgia,serif; font-style:italic; font-size:24px; }
      .subtitle  { fill:#6b7280; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:16px; }
    </style>
  </defs>
  <rect width="1600" height="782" fill="#ffffff"/>

  <!-- Title -->
  <text class="title"    x="800" y="170" text-anchor="middle">Versioned · archived · cited</text>
  <text class="subtitle" x="800" y="194" text-anchor="middle">every release minted as a permanent DOI, every version citable separately</text>

  <!-- Cards (5 versions) -->
  <!-- Layout: 5 cards 240 wide, gaps 50, total 1450, start (1600-1450)/2=75 -->
  <!-- Lefts: 75, 365, 655, 945, 1235; rights: 315, 605, 895, 1185, 1475; centers: 195, 485, 775, 1065, 1355 -->

  <!-- Card 1 -->
  <rect class="card" x="75" y="240" width="240" height="120" rx="5"/>
  <text class="ver"  x="195" y="275" text-anchor="middle">v 0.1.0</text>
  <text class="date" x="195" y="297" text-anchor="middle">2025-03-15  ·  4.2 MB</text>
  <text class="doi"  x="195" y="333" text-anchor="middle">10.5281/zenodo.4291834</text>
  <text class="size" x="195" y="351" text-anchor="middle">first deposit</text>

  <!-- Card 2 -->
  <rect class="card" x="365" y="240" width="240" height="120" rx="5"/>
  <text class="ver"  x="485" y="275" text-anchor="middle">v 0.2.0</text>
  <text class="date" x="485" y="297" text-anchor="middle">2025-08-22  ·  5.1 MB</text>
  <text class="doi"  x="485" y="333" text-anchor="middle">10.5281/zenodo.5104562</text>
  <text class="size" x="485" y="351" text-anchor="middle">added orange peel</text>

  <!-- Card 3 -->
  <rect class="card" x="655" y="240" width="240" height="120" rx="5"/>
  <text class="ver"  x="775" y="275" text-anchor="middle">v 1.0.0</text>
  <text class="date" x="775" y="297" text-anchor="middle">2026-01-10  ·  7.8 MB</text>
  <text class="doi"  x="775" y="333" text-anchor="middle">10.5281/zenodo.6238771</text>
  <text class="size" x="775" y="351" text-anchor="middle">peer-reviewed release</text>

  <!-- Card 4 -->
  <rect class="card" x="945" y="240" width="240" height="120" rx="5"/>
  <text class="ver"  x="1065" y="275" text-anchor="middle">v 1.1.0</text>
  <text class="date" x="1065" y="297" text-anchor="middle">2026-03-04  ·  8.0 MB</text>
  <text class="doi"  x="1065" y="333" text-anchor="middle">10.5281/zenodo.6914032</text>
  <text class="size" x="1065" y="351" text-anchor="middle">corrected leaf labels</text>

  <!-- Card 5 (current) -->
  <rect class="card-cur" x="1235" y="240" width="240" height="120" rx="5"/>
  <text class="ver"  x="1355" y="275" text-anchor="middle">v 1.2.0</text>
  <text class="date" x="1355" y="297" text-anchor="middle">2026-04-21  ·  9.6 MB</text>
  <text class="doi"  x="1355" y="333" text-anchor="middle" fill="#d95f5f">10.5281/zenodo.7128945</text>
  <text class="size" x="1355" y="351" text-anchor="middle" fill="#d95f5f">current · resolved</text>

  <!-- Drop lines from each card to timeline -->
  <line class="drop" x1="195"  y1="361" x2="195"  y2="425"/>
  <line class="drop" x1="485"  y1="361" x2="485"  y2="425"/>
  <line class="drop" x1="775"  y1="361" x2="775"  y2="425"/>
  <line class="drop" x1="1065" y1="361" x2="1065" y2="425"/>
  <line class="drop" x1="1355" y1="361" x2="1355" y2="425"/>

  <!-- Timeline -->
  <line class="tl-line" x1="60" y1="440" x2="1540" y2="440"/>

  <!-- Dots -->
  <circle class="dot" cx="195"  cy="440" r="7"/>
  <circle class="dot" cx="485"  cy="440" r="7"/>
  <circle class="dot" cx="775"  cy="440" r="7"/>
  <circle class="dot" cx="1065" cy="440" r="7"/>
  <circle class="dot-ring" cx="1355" cy="440" r="11"/>
  <circle class="dot-cur"  cx="1355" cy="440" r="7"/>

  <!-- Tick labels under dots -->
  <text class="tick-lbl" x="195"  y="465" text-anchor="middle">Mar 2025</text>
  <text class="tick-lbl" x="485"  y="465" text-anchor="middle">Aug 2025</text>
  <text class="tick-lbl" x="775"  y="465" text-anchor="middle">Jan 2026</text>
  <text class="tick-lbl" x="1065" y="465" text-anchor="middle">Mar 2026</text>
  <text class="tick-lbl" x="1355" y="465" text-anchor="middle">Apr 2026</text>

  <!-- Concept DOI footer -->
  <line class="tl-line" x1="60" y1="525" x2="1540" y2="525" opacity="0.5"/>
  <text class="footer-l" x="800" y="550" text-anchor="middle">concept doi · resolves to latest</text>
  <text class="footer-v" x="800" y="582" text-anchor="middle">10.5281/zenodo.4291800</text>
</svg>
