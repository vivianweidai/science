<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 782" width="1600" height="782">
  <defs>
    <style>
      .axis-line { stroke:#9aa3af; stroke-width:1.2; fill:none; }
      .grid { stroke:#eceff3; stroke-width:1; fill:none; }
      .tick { fill:#6b7280; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:18px; font-feature-settings:"tnum"; }
      .axlbl { fill:#374151; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:20px; }
      .bandlbl { fill:#6b7280; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:16px; letter-spacing:.04em; }
      .bar { fill:#5e6b7e; }
      .legend-box { fill:#ffffff; stroke:#d1d9e0; stroke-width:1; }
      .legend-title { fill:#1f2328; font-family:'Iowan Old Style','Charter',Georgia,serif; font-size:18px; font-style:italic; }
      .legend-text { fill:#4a5568; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:15px; }
    </style>
  </defs>
  <rect width="1600" height="782" fill="#ffffff"/>

  <!-- Pastel feature-region bands (matching the FTIR hero) -->
  <rect x="266"   y="180" width="175"  height="420" fill="#c5d9f7" opacity="0.45"/>
  <rect x="518.6" y="180" width="58.4" height="420" fill="#d4e8a0" opacity="0.50"/>
  <rect x="1004.4" y="180" width="19.4" height="420" fill="#f4c2cb" opacity="0.55"/>
  <rect x="1031.5" y="180" width="23.4" height="420" fill="#f9c4a8" opacity="0.45"/>
  <rect x="1101.4" y="180" width="58.4" height="420" fill="#f9c4a8" opacity="0.45"/>
  <rect x="1198.7" y="180" width="97.3" height="420" fill="#d9ccee" opacity="0.55"/>

  <!-- Band labels, rotated like the FTIR -->
  <text class="bandlbl" transform="translate(353 230) rotate(-90)" text-anchor="end">O–H stretch</text>
  <text class="bandlbl" transform="translate(548 230) rotate(-90)" text-anchor="end">C–H stretch</text>
  <text class="bandlbl" transform="translate(1014 230) rotate(-90)" text-anchor="end">C=O</text>
  <text class="bandlbl" transform="translate(1043 230) rotate(-90)" text-anchor="end">C=C</text>
  <text class="bandlbl" transform="translate(1130 230) rotate(-90)" text-anchor="end">C–H bend</text>
  <text class="bandlbl" transform="translate(1247 230) rotate(-90)" text-anchor="end">C–O stretch</text>

  <!-- Horizontal gridlines -->
  <line class="grid" x1="130" y1="500" x2="1490" y2="500"/>
  <line class="grid" x1="130" y1="400" x2="1490" y2="400"/>
  <line class="grid" x1="130" y1="300" x2="1490" y2="300"/>
  <line class="grid" x1="130" y1="200" x2="1490" y2="200"/>

  <!-- Bars: feature importance over wavenumber. Width 7, centered on x. -->
  <!-- Heights: y_top = 600 - imp*500, height = 600 - y_top -->
  <rect class="bar" x="126.5"  y="590" width="7" height="10"/>
  <rect class="bar" x="184.8"  y="585" width="7" height="15"/>
  <rect class="bar" x="243.0"  y="570" width="7" height="30"/>
  <rect class="bar" x="281.9"  y="510" width="7" height="90"/>
  <rect class="bar" x="340.2"  y="390" width="7" height="210"/>
  <rect class="bar" x="398.5"  y="325" width="7" height="275"/>
  <rect class="bar" x="437.4"  y="450" width="7" height="150"/>
  <rect class="bar" x="476.2"  y="570" width="7" height="30"/>
  <rect class="bar" x="534.5"  y="400" width="7" height="200"/>
  <rect class="bar" x="546.2"  y="290" width="7" height="310"/>
  <rect class="bar" x="561.7"  y="350" width="7" height="250"/>
  <rect class="bar" x="573.4"  y="450" width="7" height="150"/>
  <rect class="bar" x="631.7"  y="580" width="7" height="20"/>
  <rect class="bar" x="709.4"  y="590" width="7" height="10"/>
  <rect class="bar" x="787.1"  y="585" width="7" height="15"/>
  <rect class="bar" x="864.8"  y="590" width="7" height="10"/>
  <rect class="bar" x="942.5"  y="580" width="7" height="20"/>
  <rect class="bar" x="981.4"  y="570" width="7" height="30"/>
  <rect class="bar" x="1002.8" y="230" width="7" height="370"/>
  <rect class="bar" x="1020.2" y="440" width="7" height="160"/>
  <rect class="bar" x="1043.5" y="375" width="7" height="225"/>
  <rect class="bar" x="1059.1" y="490" width="7" height="110"/>
  <rect class="bar" x="1097.9" y="560" width="7" height="40"/>
  <rect class="bar" x="1117.3" y="420" width="7" height="180"/>
  <rect class="bar" x="1144.5" y="510" width="7" height="90"/>
  <rect class="bar" x="1175.6" y="550" width="7" height="50"/>
  <rect class="bar" x="1214.4" y="500" width="7" height="100"/>
  <rect class="bar" x="1233.9" y="390" width="7" height="210"/>
  <rect class="bar" x="1261.0" y="320" width="7" height="280"/>
  <rect class="bar" x="1284.4" y="430" width="7" height="170"/>
  <rect class="bar" x="1311.6" y="550" width="7" height="50"/>
  <rect class="bar" x="1338.8" y="570" width="7" height="30"/>
  <rect class="bar" x="1369.9" y="580" width="7" height="20"/>
  <rect class="bar" x="1408.7" y="585" width="7" height="15"/>
  <rect class="bar" x="1447.6" y="590" width="7" height="10"/>
  <rect class="bar" x="1486.5" y="590" width="7" height="10"/>

  <!-- Axes -->
  <line class="axis-line" x1="130" y1="600" x2="1490" y2="600"/>
  <line class="axis-line" x1="130" y1="180" x2="130"  y2="600"/>

  <!-- X ticks (wavenumber descending: 4000 → 500) -->
  <text class="tick" x="130"   y="625" text-anchor="middle">4,000</text>
  <text class="tick" x="324.3" y="625" text-anchor="middle">3,500</text>
  <text class="tick" x="518.6" y="625" text-anchor="middle">3,000</text>
  <text class="tick" x="712.9" y="625" text-anchor="middle">2,500</text>
  <text class="tick" x="907.1" y="625" text-anchor="middle">2,000</text>
  <text class="tick" x="1101.4" y="625" text-anchor="middle">1,500</text>
  <text class="tick" x="1295.7" y="625" text-anchor="middle">1,000</text>
  <text class="tick" x="1490"  y="625" text-anchor="middle">500</text>

  <!-- Y ticks -->
  <text class="tick" x="115" y="606" text-anchor="end">0.0</text>
  <text class="tick" x="115" y="506" text-anchor="end">0.2</text>
  <text class="tick" x="115" y="406" text-anchor="end">0.4</text>
  <text class="tick" x="115" y="306" text-anchor="end">0.6</text>
  <text class="tick" x="115" y="206" text-anchor="end">0.8</text>

  <!-- Axis labels -->
  <text class="axlbl" transform="translate(58 400) rotate(-90)" text-anchor="middle">feature importance</text>
  <text class="axlbl" x="810" y="660" text-anchor="middle">wavenumber (cm⁻¹)</text>

  <!-- Quiet legend, top-right -->
  <g>
    <rect class="legend-box" x="1242" y="120" width="248" height="46" rx="4"/>
    <text class="legend-title" x="1255" y="142">Random forest</text>
    <text class="legend-text"  x="1255" y="158">200 trees · finger / leaf / orange peel</text>
  </g>
</svg>
