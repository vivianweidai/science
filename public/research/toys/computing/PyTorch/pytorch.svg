<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 782" width="1600" height="782">
  <defs>
    <style>
      .axis-line { stroke:#9aa3af; stroke-width:1.2; fill:none; }
      .grid      { stroke:#eceff3; stroke-width:1; fill:none; }
      .tick      { fill:#6b7280; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:18px; font-feature-settings:"tnum"; }
      .axlbl     { fill:#374151; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:20px; }
      .train-line { stroke:#7d6bb3; stroke-width:2.4; fill:none; }
      .train-band { fill:#d9ccee; opacity:0.55; }
      .val-line   { stroke:#d95f5f; stroke-width:2.4; fill:none; stroke-dasharray:6 4; }
      .val-band   { fill:#f4c2cb; opacity:0.45; }
      .stop-line  { stroke:#1f2328; stroke-width:1; stroke-dasharray:3 4; opacity:0.4; }
      .stop-lbl   { fill:#1f2328; font-family:'Iowan Old Style','Charter',Georgia,serif; font-style:italic; font-size:18px; }
      .curve-lbl  { font-family:'Iowan Old Style','Charter',Georgia,serif; font-size:20px; font-style:italic; }
      .title      { fill:#1f2328; font-family:'Iowan Old Style','Charter',Georgia,serif; font-size:22px; font-style:italic; }
      .subtitle   { fill:#6b7280; font-family:'Avenir Next','SF Pro Text','Helvetica Neue',sans-serif; font-size:16px; }
    </style>
  </defs>
  <rect width="1600" height="782" fill="#ffffff"/>

  <!-- Horizontal gridlines at loss = 0.5, 1.0, 1.5 -->
  <line class="grid" x1="130" y1="453" x2="1490" y2="453"/>
  <line class="grid" x1="130" y1="327" x2="1490" y2="327"/>
  <line class="grid" x1="130" y1="200" x2="1490" y2="200"/>

  <!-- Validation ±σ band -->
  <path class="val-band" d="
    M 130,210 L 184,275 L 239,331 L 293,372 L 348,402 L 402,430 L 457,447 L 511,460
    L 566,470 L 620,475 L 674,480 L 729,485 L 783,488 L 838,490 L 892,488 L 947,485
    L 1001,481 L 1056,477 L 1110,472 L 1164,468 L 1219,466 L 1273,465 L 1328,462
    L 1382,462 L 1437,459 L 1490,456
    L 1490,481 L 1437,484 L 1382,487 L 1328,487 L 1273,490 L 1219,491 L 1164,493
    L 1110,497 L 1056,502 L 1001,506 L 947,510 L 892,513 L 838,515 L 783,513
    L 729,510 L 674,505 L 620,500 L 566,495 L 511,485 L 457,472 L 402,455
    L 348,427 L 293,397 L 239,356 L 184,300 L 130,235 Z"/>

  <!-- Train ±σ band -->
  <path class="train-band" d="
    M 130,208 L 184,276 L 239,333 L 293,380 L 348,414 L 402,446 L 457,465 L 511,479
    L 566,493 L 620,503 L 674,512 L 729,515 L 783,524 L 838,527 L 892,532 L 947,534
    L 1001,536 L 1056,538 L 1110,539 L 1164,541 L 1219,542 L 1273,544 L 1328,543
    L 1382,546 L 1437,544 L 1490,545
    L 1490,559 L 1437,558 L 1382,560 L 1328,557 L 1273,558 L 1219,556 L 1164,555
    L 1110,553 L 1056,552 L 1001,550 L 947,548 L 892,546 L 838,541 L 783,538
    L 729,529 L 674,526 L 620,517 L 566,507 L 511,493 L 457,479 L 402,460
    L 348,428 L 293,394 L 239,347 L 184,290 L 130,222 Z"/>

  <!-- Train curve -->
  <polyline class="train-line" points="
    130,215 184,283 239,340 293,387 348,421 402,453 457,472 511,486
    566,500 620,510 674,519 729,522 783,531 838,534 892,539 947,541
    1001,543 1056,545 1110,546 1164,548 1219,549 1273,551 1328,550
    1382,553 1437,551 1490,552"/>

  <!-- Validation curve -->
  <polyline class="val-line" points="
    130,222 184,287 239,343 293,384 348,414 402,442 457,459 511,472
    566,482 620,487 674,492 729,497 783,500 838,502 892,500 947,497
    1001,493 1056,489 1110,484 1164,480 1219,478 1273,477 1328,474
    1382,474 1437,471 1490,468"/>

  <!-- Best-epoch / early-stop guideline -->
  <line class="stop-line" x1="810" y1="200" x2="810" y2="580"/>
  <text class="stop-lbl" x="816" y="225">early stop · epoch 25</text>

  <!-- Axes -->
  <line class="axis-line" x1="130" y1="580" x2="1490" y2="580"/>
  <line class="axis-line" x1="130" y1="180" x2="130"  y2="580"/>

  <!-- X ticks -->
  <text class="tick" x="130"  y="608" text-anchor="middle">0</text>
  <text class="tick" x="402"  y="608" text-anchor="middle">10</text>
  <text class="tick" x="674"  y="608" text-anchor="middle">20</text>
  <text class="tick" x="947"  y="608" text-anchor="middle">30</text>
  <text class="tick" x="1219" y="608" text-anchor="middle">40</text>
  <text class="tick" x="1490" y="608" text-anchor="middle">50</text>

  <!-- Y ticks -->
  <text class="tick" x="115" y="586" text-anchor="end">0.0</text>
  <text class="tick" x="115" y="459" text-anchor="end">0.5</text>
  <text class="tick" x="115" y="333" text-anchor="end">1.0</text>
  <text class="tick" x="115" y="206" text-anchor="end">1.5</text>

  <!-- Axis labels -->
  <text class="axlbl" transform="translate(58 380) rotate(-90)" text-anchor="middle">cross-entropy loss</text>
  <text class="axlbl" x="810" y="640" text-anchor="middle">epoch</text>

  <!-- Curve in-line labels -->
  <text class="curve-lbl" x="1500" y="556" fill="#7d6bb3">train</text>
  <text class="curve-lbl" x="1500" y="472" fill="#d95f5f">val</text>

  <!-- Quiet header -->
  <text class="title"    x="130" y="130">Training trajectory</text>
  <text class="subtitle" x="130" y="152">SGD + momentum · batch 64 · CIFAR-style 3-class head</text>
</svg>
