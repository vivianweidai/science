<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 782" width="1600" height="782">
  <defs>
    <style>
      .gutter   { fill:#3b5998; font-family:'SF Mono','Menlo',monospace; font-size:18px; letter-spacing:.01em; }
      .md-h     { fill:#1f2328; font-family:'Iowan Old Style','Charter',Georgia,serif; font-size:32px; }
      .md-body  { fill:#374151; font-family:'Iowan Old Style','Charter',Georgia,serif; font-size:20px; font-style:italic; }
      .code     { fill:#1f2328; font-family:'SF Mono','Menlo',monospace; font-size:18px; }
      .code-kw  { fill:#7d6bb3; font-family:'SF Mono','Menlo',monospace; font-size:18px; font-weight:600; }
      .code-fn  { fill:#3b5998; font-family:'SF Mono','Menlo',monospace; font-size:18px; }
      .code-str { fill:#8d6e3a; font-family:'SF Mono','Menlo',monospace; font-size:18px; }
      .code-num { fill:#8d6e3a; font-family:'SF Mono','Menlo',monospace; font-size:18px; }
      .code-com { fill:#9aa3af; font-family:'SF Mono','Menlo',monospace; font-size:18px; font-style:italic; }
      .out-num  { fill:#1f2328; font-family:'SF Mono','Menlo',monospace; font-size:18px; }
      .cell-md  { fill:#ffffff; stroke:none; }
      .cell-in  { fill:#f6f8fa; stroke:#dde3ea; stroke-width:1; }
      .cell-out { fill:#ffffff; stroke:#dde3ea; stroke-width:1; }
      .axis-line { stroke:#9aa3af; stroke-width:1; fill:none; }
      .grid     { stroke:#eceff3; stroke-width:1; fill:none; }
      .tick     { fill:#6b7280; font-family:'SF Mono','Menlo',monospace; font-size:11px; }
      .out-bar  { fill:#5e6b7e; }
    </style>
  </defs>
  <rect width="1600" height="782" fill="#fbfbfd"/>

  <!-- Markdown cell (no border, just a render) -->
  <text class="gutter" x="155" y="225" text-anchor="end">M</text>
  <text class="md-h"    x="200" y="226">Random forest on FTIR spectra</text>
  <text class="md-body" x="200" y="262">Three sample types — finger, leaf, orange peel — distinguished by absorption bands.</text>

  <!-- In [3] code cell -->
  <rect class="cell-in" x="200" y="295" width="1200" height="130" rx="3"/>
  <text class="gutter" x="155" y="320" text-anchor="end">In [3]:</text>
  <text x="220" y="328" font-family="'SF Mono',Menlo,monospace" font-size="18">
    <tspan class="code-kw">from</tspan>
    <tspan class="code"> sklearn.ensemble </tspan>
    <tspan class="code-kw">import</tspan>
    <tspan class="code"> RandomForestClassifier</tspan>
  </text>
  <text x="220" y="358" font-family="'SF Mono',Menlo,monospace" font-size="18">
    <tspan class="code">clf </tspan>
    <tspan class="code-kw">=</tspan>
    <tspan class="code-fn"> RandomForestClassifier</tspan>
    <tspan class="code">(</tspan>
    <tspan class="code">n_estimators</tspan>
    <tspan class="code-kw">=</tspan>
    <tspan class="code-num">200</tspan>
    <tspan class="code">).fit(X_train, y_train)</tspan>
  </text>
  <text x="220" y="388" font-family="'SF Mono',Menlo,monospace" font-size="18">
    <tspan class="code-fn">print</tspan>
    <tspan class="code">(</tspan>
    <tspan class="code-str">f"accuracy: {clf.score(X_test, y_test):.3f}"</tspan>
    <tspan class="code">)</tspan>
  </text>
  <text x="220" y="412" class="code-com">  # 90 spectra · 3 classes · 70/30 split</text>

  <!-- Out [3] cell with text + tiny chart -->
  <rect class="cell-out" x="200" y="445" width="1200" height="170" rx="3"/>
  <text class="gutter" x="155" y="475" text-anchor="end">Out [3]:</text>
  <text class="out-num" x="220" y="478">accuracy: 0.956</text>

