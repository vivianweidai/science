# Toys (scientific instruments & technologies) — single source of truth.
# Run `python pipeline/scripts/build_toys.py` after edits to regenerate JSON.
#
# Three-level schema:
#   science:      Biology | Chemistry | Physics | Computing |        (required)
#                 Mathematics | Astronomy
#   topic:        string — top-level heading (e.g. Vibrational Spectroscopy) (required)
#   technologies: list of techniques within this topic                (required)
#     - technology:   string — technique name (e.g. Infrared)         (required)
#       description:  string — what this technique does               (required)
#       toys:         list of specific instruments                    (optional — omit if no specific toys)
#         - toy:          string — instrument name                    (required)
#           specs:        string — key specs                          (required)
#           available:    true                                        (optional)
#           completed:    "YYYYMMDD Project Name"                     (optional — links to project page)
#           extension_of: "YYYYMMDD Project Name"                     (optional — links to that project's #extensions section, for second-tier toys documented but not yet run)
#           url:          string — external URL                       (optional — links toy name to any URL)

# ═══════════════════════════════════════════════════════════════
# MATHEMATICS
# ═══════════════════════════════════════════════════════════════

- science: Mathematics
  topic: Compute
  description: Compute the answer — algebra, integrals and linear systems
  technologies:
    - technology: Numerical
      description: Approximate answers at scale
      toys:
        - toy: NumPy
          specs: Array foundation — linear algebra and vectorized math
          available: true
          url: /research/projects/20260420%20UV-Vis%20Spectroscopy/
        - toy: SciPy
          specs: Scientific routines — ODEs, optimizers and Fourier transforms
          available: true
          completed: "20250225 Catfood"
    - technology: Symbolic
      description: Exact answers in closed form
      toys:
        - toy: Wolfram Alpha
          specs: Symbolic engine with built-in mathematical knowledge
          available: true
          url: https://www.wolframcloud.com/obj/jamesdai/Published/exoplanets.nb

- science: Mathematics
  topic: Communicate
  description: Communicate the answer — figures and typeset equations
  technologies:
    - technology: Graphing
      description: Figures from data
      toys:
        - toy: Matplotlib
          specs: Python 2D and 3D plotting
          available: true
          url: /research/projects/20260404%20Four%20Point%20Probe/
    - technology: Typesetting
      description: Documents and equations
      toys:
        - toy: LaTeX
          specs: Equations, references and bibliographies
          available: true
          url: /curriculum/

# ═══════════════════════════════════════════════════════════════
# COMPUTING
# ═══════════════════════════════════════════════════════════════

- science: Computing
  topic: Analyze
  description: Analyze the data — find patterns and test claims
  technologies:
    - technology: Statistics
      description: Quantify uncertainty in claims
      toys:
        - toy: SciPy
          specs: Hypothesis tests, distributions and confidence intervals
          available: true
          completed: "20250225 Catfood"
    - technology: Machine Learning
      description: Learn patterns to predict
      toys:
        - toy: scikit-learn
          specs: Classic models for training and prediction
          available: true
        - toy: PyTorch
          specs: Neural networks for GPU-accelerated deep learning
          available: true

- science: Computing
  topic: Publish
  description: Publish the work — make it public and reproducible
  technologies:
    - technology: Repository
      description: Where code and notebooks live
      toys:
        - toy: GitHub
          specs: Data and source code repositories
          available: true
          url: https://github.com/vivianweidai
        - toy: Jupyter
          specs: Notebooks combining code, figures and narrative
          available: true
          url: https://colab.research.google.com/github/vivianweidai/science/blob/main/public/research/projects/20260420%20UV-Vis%20Spectroscopy/output/uv_spectroscopy.ipynb
    - technology: Reproducibility
      description: Freeze environments and archive results
      toys:
        - toy: Docker
          specs: Containers that freeze every dependency
          available: true
        - toy: Zenodo
          specs: Permanent DOI archive for datasets and code
          available: true

# ═══════════════════════════════════════════════════════════════
# PHYSICS
# ═══════════════════════════════════════════════════════════════


- science: Physics
  topic: Thermodynamics
  description: Heat, temperature and energy flow
  technologies:
    - technology: Temperature
      description: How hot is it?
      toys:
        - toy: Thermocouple
          specs: Contact probe — point measurement at a junction
        - toy: IR Camera
          specs: Non-contact imaging — full thermal field at once
    - technology: Heat
      description: How does energy move?
      toys:
        - toy: Stirling Engine
          specs: Heat to work — classical engine cycle
        - toy: Peltier
          specs: Work to heat — semiconductor heat pump

- science: Physics
  topic: Electromagnetism
  description: Fields, currents and light
  technologies:
    - technology: Circuits
      description: Electric current in wires and matter
      toys:
        - toy: Oscilloscope
          specs: Time-varying signals — waveforms and transients
        - toy: Multimeter
          specs: Steady-state values — voltage, current and resistance
          available: true
          completed: "20260404 Four Point Probe"
    - technology: Optics
      description: Electromagnetic radiation, visible and beyond
      toys:
        - toy: Laser
          specs: Produce — coherent monochromatic light
        - toy: Spectrometer
          specs: Analyze — disperse light by wavelength
        - toy: Interferometer
          specs: Interfere — combine beams to reveal phase

# ═══════════════════════════════════════════════════════════════
# CHEMISTRY
# ═══════════════════════════════════════════════════════════════

- science: Chemistry
  topic: Physical
  description: Separate and transform — non-spectroscopic characterization
  technologies:
    - technology: Separation
      description: Pull mixtures apart — by density or chemistry
      toys:
        - toy: Centrifugation
          specs: Spin samples — separate by density at high g-forces
          available: true
          completed: "20260411 Centrifuge"
        - toy: Liquid Chromatography
          specs: Liquid through packed column — soluble analytes
          available: true
          completed: "20260427 Chromatography"
        - toy: Gas Chromatography
          specs: Gas through heated capillary — volatile analytes
          available: true
          completed: "20260427 Chromatography"
    - technology: Thermal Analysis
      description: Watch samples change with heat
      toys:
        - toy: Thermogravimetry
          specs: Mass loss with heating — decomposition and moisture
          available: true
          completed: "20260405 Melting Point"
        - toy: Calorimetry
          specs: Energy flow with heating — phase transitions and heat capacity
          available: true
          completed: "20260405 Melting Point"
- science: Chemistry
  topic: Spectroscopic
  description: Probe intact molecules — electromagnetic, magnetic and mass spectra
  technologies:
    - technology: Molecular Spectroscopy
      description: Absorb EM radiation — vibrational, electronic and nuclear transitions
      toys:
        - toy: IR Spectroscopy
          specs: Polar bonds — functional-group fingerprints
          available: true
          completed: "20260419 IR Spectroscopy"
        - toy: UV-Vis Spectroscopy
          specs: Light absorption — concentration and conjugation
          available: true
          completed: "20260420 UV-Vis Spectroscopy"
        - toy: NMR Spectroscopy
          specs: ¹H and ¹³C environments — full structural fingerprint
    - technology: Mass Spectrometry
      description: Ionize and weigh — intact mass and fragment fingerprints
      toys:
        - toy: MALDI
          specs: Large molecules — intact mass via laser + matrix
          available: true
          completed: "20260427 Mass Spectrometry"
        - toy: Liquid Chromatography MS
          specs: Nonvolatile molecules — intact weight via electrospray
          available: true
          completed: "20260427 Mass Spectrometry"
        - toy: Gas Chromatography MS
          specs: Volatile molecules — fragment fingerprints via electron ionization
          available: true
          completed: "20260427 Mass Spectrometry"

# ═══════════════════════════════════════════════════════════════
# BIOLOGY
# ═══════════════════════════════════════════════════════════════

- science: Biology
  topic: Cells
  description: See and record living systems
  technologies:
    - technology: Microscopy
      description: Image cells at every scale
      toys:
        - toy: Handheld
          specs: Mobile scope — surface inspection without sample prep
          available: true
        - toy: Stereo
          specs: Reflected light — whole specimens in 3D at low magnification
          available: true
        - toy: Compound
          specs: Transmitted light — cells through a slide at high magnification
          available: true
    - technology: Systems Imaging
      description: Record brain activity
      toys:
        - toy: EEG
          specs: Scalp electrodes — Muse
        - toy: fNIRS
          specs: Near-infrared light — cortical blood flow

- science: Biology
  topic: Molecules
  description: Read and write DNA and proteins
  technologies:
    - technology: Amplification
      description: Copy DNA for detection
      toys:
        - toy: PCR
          specs: Endpoint amplification — cycle temperature until enough copies exist
          available: true
          completed: "20260401 Genes in Space"
        - toy: qPCR
          specs: Real-time quantitation — count copies as they are made
    - technology: Sequencing
      description: Read the DNA code
      toys:
        - toy: Long-Read
          specs: One long sequence end to end — MinION
        - toy: Short-Read
          specs: Many short sequences in parallel
    - technology: Expression
      description: Make and see proteins
      toys:
        - toy: Cell-Free
          specs: Produce protein from DNA without living cells
          available: true
          completed: "20260401 Genes in Space"
        - toy: Fluorescence
          specs: Visualize protein glow under UV light
          available: true
          completed: "20260401 Genes in Space"

# ═══════════════════════════════════════════════════════════════
# ASTRONOMY
# ═══════════════════════════════════════════════════════════════

- science: Astronomy
  topic: Observe
  description: Where the light comes from — capture photons across the spectrum
  technologies:
    - technology: Visible
      description: Optical wavelengths from backyards to mountaintop observatories
      toys:
        - toy: Household
          specs: Amateur smart telescope — motorized mount and integrated camera
          available: true
        - toy: Earth
          specs: Meter-class ground telescope at a dark site
          available: true
    - technology: Invisible
      description: Wavelengths outside the visible — radio through X-ray
      toys:
        - toy: Radio
          specs: Backyard antenna to synthesized array — Jupiter bursts to galactic structure
          available: true
        - toy: Space
          specs: Above the atmosphere — UV, infrared and X-ray wavelengths blocked by air

- science: Astronomy
  topic: Decode
  description: What the light tells you — extract measurements and classify sources
  technologies:
    - technology: Analysis
      description: Extract measurements from raw images
      toys:
        - toy: Photometry
          specs: How bright — light curves reveal variability, transits and distance
          available: true
        - toy: Astrometry
          specs: Where — positions and proper motions reveal parallax and orbits
          available: true
        - toy: Spectroscopy
          specs: What — wavelengths reveal composition, temperature and radial velocity
          available: true
    - technology: Classification
      description: Label sources with machine learning
      toys:
        - toy: Transient
          specs: Classical ML on light curves — supernovae, variable stars
        - toy: Galaxy Morphology
          specs: Deep CNN on galaxy images — spirals, ellipticals, mergers
