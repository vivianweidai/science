# Tech & Toys catalog — single source of truth.
#   Tech = a research capability (a row on the Research page).
#   Toy  = a specific physical instrument that enables a Tech.
# Run `python pipeline/scripts/build_tech.py` after edits to regenerate JSON.
#
# Three-level schema:
#   science:      Biology | Chemistry | Physics | Computing |        (required)
#                 Mathematics | Astronomy
#   topic:        string — top-level heading (e.g. Vibrational Spectroscopy) (required)
#   categories:   list of categories within this topic               (required)
#     - category:     string — category name (e.g. Infrared)         (required)
#       description:  string — what this category covers             (required)
#       techs:        list of techs in this category                 (optional — omit if no techs yet)
#         - tech:         string — tech name (a row on Research)     (required)
#           specs:        string — key specs                         (required)
#           available:    true                                       (optional — set when at least one Toy enables it)
#           url:          string — external URL                      (optional — links tech name to any URL)
#
# Tech ↔ project links are populated via reverse-scan: declare the tech in
# the project's `index.md` frontmatter `tech:` array and it shows up on
# the tech page automatically.

# ═══════════════════════════════════════════════════════════════
# MATHEMATICS
# ═══════════════════════════════════════════════════════════════

- science: Mathematics
  topic: Calculate
  description: Calculate the answer
  categories:
    - category: Numerical
      description: Approximate answers
      techs:
        - tech: NumPy
          specs: Arrays
          available: true
          url: /research/projects/20260420%20UV-Vis%20Spectroscopy/
        - tech: SciPy
          specs: Routines
          available: true
    - category: Symbolic
      description: Exact answers
      techs:
        - tech: Wolfram Alpha
          specs: Symbolic answers
          available: true
          url: https://www.wolframcloud.com/obj/jamesdai/Published/exoplanets.nb

- science: Mathematics
  topic: Communicate
  description: Communicate the answer
  categories:
    - category: Graphing
      description: Data to figures
      techs:
        - tech: Matplotlib
          specs: Plots
          available: true
          url: /research/projects/20260404%20Four%20Point%20Probe/
    - category: Typesetting
      description: Documents and equations
      techs:
        - tech: LaTeX
          specs: Typeset documents
          available: true
          url: /curriculum/

# ═══════════════════════════════════════════════════════════════
# COMPUTING
# ═══════════════════════════════════════════════════════════════

- science: Computing
  topic: Analyze
