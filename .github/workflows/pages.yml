name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate-listings:
    # Rebuild olympiads.json and textbooks.json from the YAML source of truth
    # and fail if the committed JSON is stale. This catches "edited YAML but
    # forgot to run the build script" mistakes before the site deploys.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Rebuild listings JSON
        run: python archives/LAYOUT/build_listings.py
      - name: Fail if committed JSON is stale
        run: |
          if ! git diff --quiet -- archives/CONTENT/olympiads.json archives/CONTENT/textbooks.json; then
            echo "::error::archives/CONTENT/*.json is out of sync with archives/CONTENT/*.yml."
            echo "Run 'python archives/LAYOUT/build_listings.py' locally and commit the result."
            git --no-pager diff -- archives/CONTENT/olympiads.json archives/CONTENT/textbooks.json
            exit 1
          fi

  build:
    needs: validate-listings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Install Jekyll
        run: gem install jekyll bundler
      - name: Build site
        run: jekyll build
        env:
          JEKYLL_ENV: production
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
