<!DOCTYPE html>
<html lang="{{ page.html_lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/archives/layout/favicon.svg">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="/archives/layout/base.css?v={{ site.time | date: '%s' }}">
  <link rel="stylesheet" href="/archives/layout/tabs.css?v={{ site.time | date: '%s' }}">
  <style>
    /* Nav link cards (default layout only) */
    .nav-links {
      display: flex;
      justify-content: center;
      gap: 0.5em;
      flex-wrap: wrap;
      margin: 1.5em 0;
    }
    .nav-links a {
      display: inline-block;
      padding: 0.4em 1em;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      background: #f6f8fa;
      color: #1f2328;
      font-size: 0.9em;
      transition: background 0.15s, border-color 0.15s;
    }
    .nav-links a:hover {
      background: #ddf4ff;
      border-color: #0969da;
      text-decoration: none;
    }
    /* Header nav (Curriculum / Olympiads / Research) */
    .page-header .header-nav {
      display: flex;
      gap: 0.8em;
      font-size: 0.9em;
      flex-shrink: 0;
      margin-left: 1em;
    }
    .page-header .header-nav a {
      font-weight: normal;
      white-space: nowrap;
    }
    .page-header .header-nav a.active {
      font-weight: 600;
      color: #1f2328;
      pointer-events: none;
      text-decoration: none;
    }
    /* Footer links (main page: GitHub / App Store / PlayStore) */
    .footer .footer-links {
      display: flex;
      gap: 0.5em;
    }
    @media (max-width: 600px) {
      .footer .footer-links { display: none; }
      .page-header .header-nav { display: none; }
    }
    .footer .footer-links a.inactive {
      color: #8c959f;
      pointer-events: none;
      text-decoration: none;
    }
    /* Footer nav active state */
    .footer .footer-nav { margin-left: auto; }
    .footer .footer-nav a.active {
      font-weight: 600;
      color: #1f2328;
      pointer-events: none;
      text-decoration: none;
    }
  </style>
</head>
<body>
  {{ content }}
  <script>
    /* Fix tab-switching jump: preserve scroll position on label click so
       reflow from shorter/taller panels doesn't shift the viewport. */
    (function() {
      document.querySelectorAll('.tabs .tab-labels label').forEach(function(label) {
        label.addEventListener('click', function() {
          var y = window.scrollY;
          requestAnimationFrame(function() { window.scrollTo(0, y); });
        });
      });
    })();
  </script>
</body>
</html>
