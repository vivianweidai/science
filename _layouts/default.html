<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
      color: #1f2328;
      line-height: 1.6;
    }
    .breadcrumb {
      text-align: right;
      font-size: 0.9em;
      margin-bottom: 0.5em;
      color: #656d76;
    }
    .breadcrumb .sep { margin: 0 0.3em; color: #656d76; }
    h1, h2 { border-bottom: 1px solid #d1d9e0; padding-bottom: 0.3em; }
    h2 { margin-top: 1.5em; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { max-width: 100%; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #d1d9e0; padding: 8px 12px; text-align: left; }
    th { background: #f6f8fa; }
    code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.9em; }
    pre { background: #f6f8fa; padding: 1em; border-radius: 6px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    ul { padding-left: 2em; }
    hr { border: none; border-top: 1px solid #d1d9e0; margin: 2em 0 0.5em 0; }
    /* CSS-only tabs */
    .tabs { margin: 1em 0; }
    .tabs input[type="radio"] { display: none; }
    .tab-labels {
      display: flex;
      justify-content: center;
      border-bottom: 2px solid #d1d9e0;
      margin-bottom: 0;
    }
    .tab-labels label {
      padding: 0.6em 1.2em;
      cursor: pointer;
      font-size: 0.9em;
      font-weight: 600;
      color: #656d76;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-labels label:hover { color: #1f2328; }
    .tab-content { display: none; padding: 1em 0; }

    #tab-math:checked ~ .tab-labels label[for="tab-math"],
    #tab-comp:checked ~ .tab-labels label[for="tab-comp"],
    #tab-phys:checked ~ .tab-labels label[for="tab-phys"],
    #tab-chem:checked ~ .tab-labels label[for="tab-chem"],
    #tab-bio:checked ~ .tab-labels label[for="tab-bio"],
    #tab-astro:checked ~ .tab-labels label[for="tab-astro"] {
      color: #0969da;
      border-bottom-color: #0969da;
    }
    #tab-math:checked ~ #content-math,
    #tab-comp:checked ~ #content-comp,
    #tab-phys:checked ~ #content-phys,
    #tab-chem:checked ~ #content-chem,
    #tab-bio:checked ~ #content-bio,
    #tab-astro:checked ~ #content-astro {
      display: block;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      font-size: 0.9em;
      color: #656d76;
    }
    .footer .footer-nav { display: flex; gap: 0.5em; }
    .footer .footer-github { margin-left: auto; }
  </style>
</head>
<body>
  {{ content }}
  <script>
    (function() {
      var tabs = ['math','comp','phys','chem','bio','astro'];
      var active = tabs.filter(function(t) {
        var content = document.getElementById('content-' + t);
        return content && !content.querySelector('em');
      });
      if (active.length === 0) active = tabs;
      var pick = active[Math.floor(Math.random() * active.length)];
      var el = document.getElementById('tab-' + pick);
      if (el) el.checked = true;
    })();
  </script>
</body>
</html>
