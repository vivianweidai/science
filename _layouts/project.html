<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.project | default: page.title | default: site.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 1rem;
      color: #1f2328;
      line-height: 1.6;
    }
    .breadcrumb {
      text-align: right;
      font-size: 0.9em;
      margin-bottom: 0.5em;
      color: #656d76;
    }
    .breadcrumb .sep { margin: 0 0.3em; color: #656d76; }
    h1, h2 { border-bottom: 1px solid #d1d9e0; padding-bottom: 0.3em; }
    h2 { margin-top: 1.5em; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { max-width: 100%; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #d1d9e0; padding: 8px 12px; text-align: left; }
    th { background: #f6f8fa; }
    code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.9em; }
    pre { background: #f6f8fa; padding: 1em; border-radius: 6px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    ul, ol { padding-left: 2em; }
    hr { border: none; border-top: 1px solid #d1d9e0; margin: 2em 0 0.5em 0; }
    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5em;
      margin: 1em 0 0.5em 0;
    }
    .photo-grid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
    }
    .photo-grid.three-col {
      grid-template-columns: 1fr 1fr 1fr;
    }
    .shuffle-btn {
      display: block;
      margin: 0 auto 1.5em auto;
      padding: 0.4em 1.2em;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      background: #f6f8fa;
      color: #1f2328;
      font-size: 0.85em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .shuffle-btn:hover {
      background: #ddf4ff;
      border-color: #0969da;
    }
    .hero-single img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 6px;
      margin: 1em 0 0.5em 0;
    }
    .project-meta {
      text-align: right;
      font-size: 0.9em;
      color: #656d76;
      margin-bottom: 1.5em;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      font-size: 0.9em;
      color: #656d76;
    }
    .footer .footer-nav { display: flex; gap: 0.5em; }
    .footer .footer-github { margin-left: auto; }

    /* CSS-only tabs */
    .tabs { margin: 1em 0; }
    .tabs input[type="radio"] { display: none; }
    .tab-labels {
      display: flex;
      justify-content: center;
      border-bottom: 2px solid #d1d9e0;
      margin-bottom: 0;
    }
    .tab-labels label {
      padding: 0.6em 1.2em;
      cursor: pointer;
      font-size: 0.9em;
      font-weight: 600;
      color: #656d76;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-labels label:hover { color: #1f2328; }
    .tab-content { display: none; padding: 1em 0; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
