<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.project | default: page.title | default: site.title }}</title>
  <link rel="stylesheet" href="/archives/formatting/base.css">
  <link rel="stylesheet" href="/archives/formatting/tabs.css">
  <style>
    /* Project layout specific styles */
    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5em;
      margin: 1em 0 0.5em 0;
    }
    .photo-grid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
    }
    .photo-grid.three-col {
      grid-template-columns: 1fr 1fr 1fr;
    }
    .shuffle-btn {
      display: block;
      margin: 0 auto 1.5em auto;
      padding: 0.4em 1.2em;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      background: #f6f8fa;
      color: #1f2328;
      font-size: 0.85em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .shuffle-btn:hover {
      background: #ddf4ff;
      border-color: #0969da;
    }
    .hero-single img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 6px;
      margin: 1em 0 0.5em 0;
    }
    .project-meta {
      text-align: right;
      font-size: 0.9em;
      color: #656d76;
      margin-bottom: 1.5em;
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
