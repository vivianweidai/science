<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.project | default: page.title | default: site.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
      color: #1f2328;
      line-height: 1.6;
    }
    .breadcrumb {
      text-align: right;
      font-size: 0.9em;
      margin-bottom: 0.5em;
      color: #656d76;
    }
    .breadcrumb .sep { margin: 0 0.3em; color: #656d76; }
    h1, h2 { border-bottom: 1px solid #d1d9e0; padding-bottom: 0.3em; }
    h2 { margin-top: 1.5em; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { max-width: 100%; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #d1d9e0; padding: 8px 12px; text-align: left; }
    th { background: #f6f8fa; }
    code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.9em; }
    pre { background: #f6f8fa; padding: 1em; border-radius: 6px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    ul, ol { padding-left: 2em; }
    hr { border: none; border-top: 1px solid #d1d9e0; margin: 2em 0 0.5em 0; }
    .footer {
      display: flex;
      justify-content: space-between;
      font-size: 0.9em;
      color: #656d76;
    }
    .footer .footer-nav { display: flex; gap: 0.5em; }
    .footer .footer-github { margin-left: auto; }
  </style>
</head>
<body>
  <nav class="breadcrumb">
    <a href="https://vivianweidai.com">Vivian Dai</a>
    <span class="sep">&gt;</span>
    <a href="https://vivianweidai.com/research/">Research</a>
    <span class="sep">&gt;</span>
    <a href="{{ page.url }}">{{ page.project }}</a>
  </nav>
  {{ content }}
</body>
</html>
