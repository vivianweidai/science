<!DOCTYPE html>
<html lang="{{ page.html_lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/archives/CONTENT/favicon.svg">
  <title>{{ page.project | default: page.title | default: site.title }}</title>
  <link rel="stylesheet" href="/archives/LAYOUT/base.css">
  <link rel="stylesheet" href="/archives/LAYOUT/tabs.css">
  <style>
    /* Project layout specific styles */
    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5em;
      margin: 1em 0 0.5em 0;
    }
    .photo-grid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
    }
    .photo-grid.three-col {
      grid-template-columns: 1fr 1fr 1fr;
    }
    .shuffle-btn {
      display: block;
      margin: 0 auto 1.5em auto;
      padding: 0.4em 1.2em;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      background: #f6f8fa;
      color: #1f2328;
      font-size: 0.85em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .shuffle-btn:hover {
      background: #ddf4ff;
      border-color: #0969da;
    }
    .hero-single img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 6px;
      margin: 1em 0 0.5em 0;
    }
    .project-meta {
      text-align: right;
      font-size: 0.9em;
      color: #656d76;
      margin-bottom: 1.5em;
    }
    .chip {
      display: inline-block; padding: 1px 7px; border-radius: 999px;
      font-size: .72em; font-weight: 600; color: #1f2328;
      text-align: center; white-space: nowrap; line-height: 1.6;
    }
    .chip.math  { background: var(--subj-math); }
    .chip.comp  { background: var(--subj-comp); }
    .chip.phys  { background: var(--subj-phys); }
    .chip.chem  { background: var(--subj-chem); }
    .chip.bio   { background: var(--subj-bio); }
    .chip.astro { background: var(--subj-astro); }
    /* Project title sits below the Research header — tone it down */
    body > h1:first-of-type { font-size: 1.6em; margin-top: 0.8em; }
    .project-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1em;
      margin: 0.8em 0;
    }
    .project-title h1 {
      font-size: 1.6em;
      margin: 0;
      border-bottom: none;
    }
    .section-heading {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1em;
      border-bottom: 1px solid #d1d9e0;
      padding-bottom: 0.3em;
      margin-top: 1.5em;
    }
    .section-heading h2 {
      margin: 0;
      border-bottom: none;
      padding-bottom: 0;
    }
    .section-date {
      font-size: 0.9em;
      color: #656d76;
    }
    .setup-highlight tbody tr:first-child td { background: #fff44f; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
